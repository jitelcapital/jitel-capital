<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4f7fb">
<title>JiTel Capital — Dayam</title>
<style>
:root{
  --bg:#eef2f7;--card:#ffffff;--ink:#152233;--mut:#5b6b7d;--line:#e4e9f0;
  --gold:#b3760a;--gold-bg:#fff6e3;
  --green:#15803d;--green-bg:#dcfce7;--green-bd:#8fe3ad;
  --amber:#b45309;--amber-bg:#fef2d6;--amber-bd:#f7cd7a;
  --blue:#1d4ed8;--blue-bg:#dbeafe;--blue-bd:#9cc0f7;
  --red:#b91c1c;--red-bg:#fee2e2;--red-bd:#f3a3a3;
  --flash-bg:#e3edff;--flash-bd:#7ea8f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);
  font-family:-apple-system,'Segoe UI',Roboto,system-ui,sans-serif;
  font-size:17px;line-height:1.5;min-height:100%;
  -webkit-text-size-adjust:100%}
#app{max-width:540px;margin:0 auto;padding:16px 16px 40px}

/* Encabezado */
.head{background:linear-gradient(135deg,#ffffff 0%,#f3f7fc 100%);
  border:1px solid var(--line);border-radius:18px;padding:18px 18px;margin-bottom:16px;
  box-shadow:0 2px 10px rgba(20,40,70,.05)}
.head .brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;color:var(--gold);letter-spacing:.2px}
.head .hola{font-size:27px;font-weight:800;margin-top:8px;color:var(--ink)}
.head .fecha{font-size:15px;color:var(--mut);margin-top:3px}

/* Bloque protagonista: próximo pago */
.prox{background:var(--amber-bg);border:2px solid var(--amber-bd);border-radius:18px;
  padding:20px 18px;margin-bottom:22px;box-shadow:0 2px 12px rgba(180,120,20,.08)}
.prox .lbl{font-size:15px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--amber)}
.prox .monto{font-size:46px;font-weight:800;line-height:1.05;margin-top:8px;color:var(--amber);word-break:break-word}
.prox .cuando{font-size:20px;font-weight:700;color:var(--ink);margin-top:10px}
.prox .detalle{font-size:15px;color:var(--mut);margin-top:4px}
.prox.ok{background:var(--green-bg);border-color:var(--green-bd)}
.prox.ok .lbl{color:var(--green)}
.prox.ok .msg{font-size:24px;font-weight:800;color:var(--green);margin-top:10px;line-height:1.3}
.prox.ok .detalle{margin-top:6px}
.prox.urgent{background:var(--red-bg);border-color:var(--red-bd)}
.prox.urgent .lbl{color:var(--red)}
.prox.urgent .monto{color:var(--red)}
.prox.clickable{cursor:pointer}
.prox.clickable:active{transform:scale(.99)}
.prox .tap-hint{font-size:14px;font-weight:700;margin-top:12px;color:var(--amber)}
.prox.urgent .tap-hint{color:var(--red)}

/* Título de sección */
.sec{font-size:19px;font-weight:800;color:var(--ink);margin:6px 4px 12px}
.sec .sub{display:block;font-size:14px;font-weight:600;color:var(--mut);margin-top:2px}

/* Tarjeta de préstamo */
.loan{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(20,40,70,.05)}
/* Estado: se mantiene grande y legible (dato clave de un vistazo) */
.estado{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:800;
  padding:8px 14px;border-radius:30px;line-height:1.2}
.estado.pagado{color:var(--green);background:var(--green-bg);border:1px solid var(--green-bd)}
.estado.pend{color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-bd)}
.estado.nuevo{color:var(--blue);background:var(--blue-bg);border:1px solid var(--blue-bd);
  font-size:14px;white-space:normal;text-align:left}
/* Monto a pagar: se mantiene grande (el otro dato clave) */
.loan .pago-lbl{font-size:12px;color:var(--mut);font-weight:600;margin-top:10px}
.loan .pago-monto{font-size:30px;font-weight:800;color:var(--ink);line-height:1.05;margin-top:1px}
/* Datos secundarios (día, capital, vencimiento): condensados */
.datos{margin-top:10px;border-top:1px solid var(--line);padding-top:7px}
.dato{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:2px 0}
.dato .k{font-size:13px;color:var(--mut)}
.dato .v{font-size:14px;font-weight:700;color:var(--ink);text-align:right}
/* Resaltado breve al llegar desde "Tu próximo pago" (se desvanece ~1.5s) */
.loan-flash{animation:loanFlash 1.5s ease-out}
@keyframes loanFlash{0%,12%{background:var(--flash-bg);border-color:var(--flash-bd)}100%{background:var(--card);border-color:var(--line)}}

/* Estados de carga / error / vacío */
.state{text-align:center;padding:60px 24px;color:var(--mut)}
.state .ico{font-size:48px;margin-bottom:14px}
.state .ttl{font-size:20px;font-weight:800;color:var(--ink);margin-bottom:8px}
.state .txt{font-size:16px;line-height:1.6}
.empty{background:var(--card);border:1px dashed var(--line);border-radius:16px;
  padding:26px 18px;text-align:center;color:var(--mut);font-size:16px}

.footer{text-align:center;font-size:14px;color:var(--mut);line-height:1.6;margin-top:24px;padding:0 10px}
.footer .lock{font-weight:700;color:var(--ink)}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#0d1521;--card:#16212f;--ink:#e9f0f8;--mut:#93a7bd;--line:#25344a;
    --gold:#f2b64a;--gold-bg:#2a2210;
    --green:#4ade80;--green-bg:#0f2e1d;--green-bd:#1f6b41;
    --amber:#fbbf5a;--amber-bg:#2e2410;--amber-bd:#6b5320;
    --blue:#7cb0ff;--blue-bg:#0f2244;--blue-bd:#2b4f8f;
    --red:#f87171;--red-bg:#3a1518;--red-bd:#7f2a2f;
    --flash-bg:#1a2c4d;--flash-bd:#3f66a8;
  }
  .head{background:linear-gradient(135deg,#16212f 0%,#111b28 100%)}
}
</style>
</head>
<body>
<div id="app">
  <div class="state">
    <div class="ico">⏳</div>
    <div class="txt">Cargando tu información…</div>
  </div>
</div>

<!-- Firebase SDK v12.16.0 (capa compat). SOLO app + firestore: esta página NO usa Authentication ni login. -->
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
<script>
// dayam.html — Vista pública de solo lectura para la clienta DAYAM.
// Sin Authentication, sin login, sin botones de acción. ES5 estricto.
(function(){
  'use strict';

  var CLIENTE='DAYAM';

  // Misma config del proyecto (reutilizada de index.html / socio.html).
  var FIREBASE_CONFIG={
    apiKey:'AIzaSyAWxcYHpJjuFhP3pl2YIa6yjOrBL7Bd9K8',
    authDomain:'jitel-capital.firebaseapp.com',
    projectId:'jitel-capital',
    storageBucket:'jitel-capital.firebasestorage.app',
    messagingSenderId:'656658891595',
    appId:'1:656658891595:web:77eac4631631d7e0941ece'
  };

  var MESES=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  var COP=function(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);};
  var G=document.getElementById('app');

  // ── Helpers de fecha / negocio (reutilizan la lógica de index.html) ──
  function nowDate(){return new Date();}
  function currMk(){var d=nowDate();var m=d.getMonth()+1;return d.getFullYear()+'-'+(m<10?'0'+m:String(m));}
  function hoyStr(){return nowDate().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
  function parseLocalDate(s){if(!s||typeof s!=='string')return null;var p=s.slice(0,10).split('-');return p.length===3?new Date(parseInt(p[0],10),parseInt(p[1],10)-1,parseInt(p[2],10)):null;}

  // isCollectable — MISMA regla que index.html: un préstamo con mes_comienzo >= CURR_MK
  // se creó este mismo mes y su primer cobro es el próximo, así que aún NO es cobrable.
  function isCollectable(l){var mk=currMk();return !(l.mes_comienzo&&(''+l.mes_comienzo)>=mk);}

  // Interés total del cliente = monto × (int_socio + int_propio). NUNCA desglosado.
  function pagoMensual(l){return (l.monto||0)*((+l.int_socio||0)+(+l.int_propio||0));}

  // ¿Ya pagó este mes? Toma en cuenta la conciliación (recibido) y los pagos con fecha del mes actual.
  function pagadoEsteMes(l){
    if(l.recibido)return true;
    var p=l.pagos||[],i,d=nowDate(),tm=d.getMonth(),ty=d.getFullYear();
    for(i=0;i<p.length;i++){var f=parseLocalDate(p[i]&&p[i].fecha);if(f&&f.getMonth()===tm&&f.getFullYear()===ty)return true;}
    return false;
  }

  function mesVencimiento(l){
    var mf=(l.mes_fin||'').toString();
    if(!mf)return '';
    return mf+(l.año?(' '+l.año):'');
  }

  // ── Estado de pago (bloque protagonista), por prioridades. Solo considera préstamos
  //    activos, cobrables (isCollectable) y aún NO pagados este mes.
  //    P1 'atrasado' — su día de cobro YA pasó este mes y sigue sin pagar.
  //    P2 'proximo'  — el próximo día de cobro futuro (hoy o después) más cercano.
  //    P3 'ninguno'  — no hay nada atrasado ni próximo. ──
  function calcularEstadoPago(loans){
    var d=nowDate();
    var y=d.getFullYear(),mo=d.getMonth(),td=d.getDate();
    var DAY=86400000;
    var todayMid=new Date(y,mo,td).getTime();
    var atrTotal=0,atrCount=0,atrDiaMin=null; // atrasados: total, cantidad y día del más antiguo
    var groups={},i;
    for(i=0;i<loans.length;i++){
      var l=loans[i];
      if(l.status!=='active')continue;
      if(!isCollectable(l))continue;      // los nuevos empiezan a cobrar el próximo mes
      if(pagadoEsteMes(l))continue;       // ya está pagado → no es "pendiente"
      var dia=parseInt(l.dia,10);if(!dia||dia<1)dia=1;if(dia>31)dia=31;
      if(dia<td){
        // Atrasado: el día de cobro ya pasó este mes y no está pagado.
        atrTotal+=pagoMensual(l);
        atrCount++;
        if(atrDiaMin===null||dia<atrDiaMin)atrDiaMin=dia; // el más antiguo = día más pequeño
      }else{
        // Próximo: hoy o un día futuro de este mes.
        var occ=new Date(y,mo,dia);
        var da=Math.round((occ.getTime()-todayMid)/DAY);
        var key=String(dia);
        if(!groups[key])groups[key]={dia:dia,daysAway:da,occ:occ,total:0,count:0};
        groups[key].total+=pagoMensual(l);
        groups[key].count++;
      }
    }
    // P1 — atrasado
    if(atrCount>0)return {tipo:'atrasado',total:atrTotal,dia:atrDiaMin,count:atrCount};
    // P2 — próximo futuro más cercano
    var best=null,ks=Object.keys(groups),j;
    for(j=0;j<ks.length;j++){var g=groups[ks[j]];if(best===null||g.daysAway<best.daysAway)best=g;}
    if(best)return {tipo:'proximo',total:best.total,dia:best.dia,count:best.count,occ:best.occ,daysAway:best.daysAway};
    // P3 — nada
    return {tipo:'ninguno'};
  }

  function textoCuando(da){
    if(da<=0)return 'Es hoy';
    if(da===1)return 'Es mañana';
    return 'Faltan '+da+' días';
  }

  // ── DOM helper ──
  function el(tag,cls,txt){
    var e=document.createElement(tag);
    if(cls)e.className=cls;
    if(txt!=null)e.textContent=String(txt);
    return e;
  }

  function showError(){
    G.innerHTML='';
    var box=el('div','state',null);
    box.appendChild(el('div','ico','📶'));
    box.appendChild(el('div','ttl','Sin conexión por ahora'));
    box.appendChild(el('div','txt','No se pudo cargar la información. Intenta de nuevo en unos minutos.'));
    G.appendChild(box);
  }

  // ── Render principal ──
  function render(loans){
    G.innerHTML='';
    var d=nowDate();
    var activos=[],i;
    for(i=0;i<loans.length;i++){if(loans[i].status==='active')activos.push(loans[i]);}
    // Orden por urgencia REAL (no por el día crudo 1-31). Mismo criterio de fecha que calcularEstadoPago:
    //  cat 0 atrasado (su día ya pasó; más antiguo = día menor primero)
    //  cat 1 próximo (menos DÍAS REALES restantes hasta el cobro, con cruce de mes)
    //  cat 2 nuevo · cat 3 pagado (al final, es lo que menos necesita revisar).
    var uy=d.getFullYear(),umo=d.getMonth(),utd=d.getDate();
    var uMid=new Date(uy,umo,utd).getTime(),uDAY=86400000;
    function urgencyRank(l){
      if(!isCollectable(l))return {cat:2,key:0};
      if(pagadoEsteMes(l))return {cat:3,key:0};
      var dia=parseInt(l.dia,10);if(!dia||dia<1)dia=1;if(dia>31)dia=31;
      if(dia<utd)return {cat:0,key:dia};                 // atrasado: día menor = más antiguo primero
      var occ=new Date(uy,umo,dia);
      return {cat:1,key:Math.round((occ.getTime()-uMid)/uDAY)}; // próximo: días reales restantes
    }
    var deco=[];for(i=0;i<activos.length;i++)deco.push({l:activos[i],r:urgencyRank(activos[i])});
    deco.sort(function(a,b){return a.r.cat!==b.r.cat?a.r.cat-b.r.cat:a.r.key-b.r.key;});
    activos=[];for(i=0;i<deco.length;i++)activos.push(deco[i].l);

    // 1) Encabezado
    var head=el('div','head',null);
    head.appendChild(el('div','brand','💼 JiTel Capital'));
    head.appendChild(el('div','hola','Hola, '+CLIENTE));
    head.appendChild(el('div','fecha',hoyStr()));
    G.appendChild(head);

    // 2) Próximo pago (bloque protagonista) — por prioridades. Clickeable en atrasado/próximo.
    var estado=calcularEstadoPago(activos);
    var proxBox=null; // bloque clickeable (queda null en estado 'ninguno')
    if(estado.tipo==='atrasado'){
      // P1 — pago atrasado (rojo/urgente)
      var uBox=el('div','prox urgent',null);
      uBox.appendChild(el('div','lbl','⚠️ Tienes un pago atrasado'));
      uBox.appendChild(el('div','monto',COP(estado.total)));
      uBox.appendChild(el('div','cuando','Venció el día '+estado.dia));
      var uDet=estado.count>1?(estado.count+' préstamos vencidos sin pagar'):'1 préstamo vencido sin pagar';
      uBox.appendChild(el('div','detalle',uDet));
      uBox.appendChild(el('div','tap-hint','👆 Toca para ver el préstamo'));
      G.appendChild(uBox);
      proxBox=uBox;
    }else if(estado.tipo==='proximo'){
      // P2 — próximo día de cobro futuro más cercano
      var box=el('div','prox',null);
      box.appendChild(el('div','lbl','Tu próximo pago'));
      box.appendChild(el('div','monto',COP(estado.total)));
      var fechaTxt=estado.occ.toLocaleDateString('es-CO',{day:'numeric',month:'long'});
      box.appendChild(el('div','cuando',textoCuando(estado.daysAway)+' · '+fechaTxt));
      var det='Se cobra el día '+estado.dia;
      if(estado.count>1)det+=' · '+estado.count+' préstamos juntos';
      box.appendChild(el('div','detalle',det));
      box.appendChild(el('div','tap-hint','👆 Toca para ver el préstamo'));
      G.appendChild(box);
      proxBox=box;
    }else{
      // P3 — nada pendiente (no clickeable)
      var okBox=el('div','prox ok',null);
      okBox.appendChild(el('div','lbl','Tu próximo pago'));
      okBox.appendChild(el('div','msg','✅ No tienes pagos pendientes por ahora'));
      okBox.appendChild(el('div','detalle','Estás al día con los pagos de este mes.'));
      G.appendChild(okBox);
    }

    // 3) Lista de préstamos activos
    G.appendChild((function(){
      var s=el('div','sec','Tus préstamos');
      s.appendChild(el('span','sub',activos.length===1?'1 préstamo activo':(activos.length+' préstamos activos')));
      return s;
    })());

    var targetCard=null; // primera tarjeta (la más urgente) para el scroll desde el bloque protagonista
    if(activos.length===0){
      G.appendChild(el('div','empty','No tienes préstamos activos en este momento.'));
    }else{
      for(i=0;i<activos.length;i++){
        (function(l,idx){
          var card=el('div','loan',null);

          // Estado (protagonista de la tarjeta)
          if(!isCollectable(l)){
            card.appendChild(el('div','estado nuevo','🆕 Préstamo nuevo — empieza a cobrar el próximo mes'));
          }else if(pagadoEsteMes(l)){
            card.appendChild(el('div','estado pagado','✅ Pagado este mes'));
          }else{
            card.appendChild(el('div','estado pend','⏳ Pendiente'));
          }

          // Monto total a pagar (interés cliente combinado, nunca desglosado)
          card.appendChild(el('div','pago-lbl','Pago de cada mes'));
          card.appendChild(el('div','pago-monto',COP(pagoMensual(l))));

          // Datos del préstamo
          var datos=el('div','datos',null);
          function fila(k,v){
            var r=el('div','dato',null);
            r.appendChild(el('div','k',k));
            r.appendChild(el('div','v',v));
            datos.appendChild(r);
          }
          fila('Día de cobro','Día '+(parseInt(l.dia,10)||'—'));
          fila('Capital prestado',COP(l.monto));
          var mv=mesVencimiento(l);
          if(mv)fila('Mes de vencimiento',mv);
          card.appendChild(datos);

          G.appendChild(card);
          if(idx===0)targetCard=card; // la lista ya está ordenada por urgencia
        })(activos[i],i);
      }
    }

    // Bloque "Tu próximo pago" clickeable → scroll suave a la tarjeta más urgente + resaltado breve
    if(proxBox&&targetCard){
      (function(box2,card2){
        box2.classList.add('clickable');
        box2.addEventListener('click',function(){
          card2.scrollIntoView({behavior:'smooth',block:'center'});
          card2.classList.remove('loan-flash');
          void card2.offsetWidth; // fuerza reflow para reiniciar la animación en toques repetidos
          card2.classList.add('loan-flash');
          setTimeout(function(){card2.classList.remove('loan-flash');},1600);
        });
      })(proxBox,targetCard);
    }

    // Pie
    var ft=el('div','footer',null);
    ft.appendChild(el('div',null,'Esta página es solo para consultar tu información.'));
    var lock=el('div',null,null);
    lock.appendChild(document.createTextNode('🔒 '));
    var b=el('span','lock','No se puede editar ni modificar nada.');
    lock.appendChild(b);
    ft.appendChild(lock);
    ft.appendChild(el('div',null,'JiTel Capital'));
    G.appendChild(ft);
  }

  // ── Inicializar Firebase (app + firestore, SIN Authentication) ──
  var db;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    try{db.settings({ignoreUndefinedProperties:true,merge:true});}catch(se){}
  }catch(e){
    showError();
    return;
  }

  // ── Consulta directa: préstamos de DAYAM (lectura pública permitida por las reglas de Firestore) ──
  try{
    db.collection('prestamos').where('responsable','==',CLIENTE).get()
      .then(function(snap){
        var loans=[];
        snap.forEach(function(doc){loans.push(doc.data());});
        render(loans);
      })
      .catch(function(){showError();});
  }catch(e){
    showError();
  }
})();
</script>
</body>
</html>
