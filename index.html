<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JiTel Capital</title>
<style>
:root{--bg:#07111e;--card:#0d1e33;--c2:#112240;--bor:#1c3455;--acc:#e9a020;--txt:#d8e8f5;--mut:#5a7a9a;--grn:#2dd87a;--red:#f04f70;--blu:#4a9eff;--wa:#25D366;--pur:#9b6dff;
/* Semantic panel/badge colors — overridden in light mode */
--c-info-bg:#0a1f2e;--c-suc-bg:#0a1f0a;--c-suc-bor:#1a4a1a;--c-suc-bor2:#1a5a2a;--c-warn-bg:#3a1e0e;--c-day-bg:#1a2a00;--c-paid-bg:#0e3a1e;--c-jul-bg:#1a2a10;--c-jul-bor:#2a5a20;--c-jul-txt:#7dde9a;--c-amber-bg:#3a2a00;--c-amber-txt:#f0a020;--c-danger-bg:#7b1c2f;--c-danger-txt:#fca5a5;--c-rf-bg:linear-gradient(135deg,#1a0e3a 0%,#0e1a38 100%);--c-kpi2-bg:rgba(0,0,0,.2);--c-urg-hoy:#3a2a00;--c-urg-past:#0e2a4a;--c-sem-ok-bg:#0e3a1e;--c-sem-bad-bg:#3a0e1a;--c-sem-partial-bg:#3a2a00;--c-sem-partial-txt:#f0c020;
/* SVG chart colors */
--chart-line:#1c3455;--chart-past-bar:#4a9eff;--chart-past-val:#9bc4e8;--chart-past-lbl:#5a7a9a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:14px}
#app{height:100vh;display:flex;flex-direction:column;max-width:600px;margin:0 auto;position:relative}
#topbar{background:linear-gradient(135deg,#0d1e33 0%,#0a1a2e 100%);border-bottom:1px solid var(--bor);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:5}
#content{flex:1;overflow-y:auto;padding:14px 14px 90px;-webkit-overflow-scrolling:touch}
#navbar{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bor);display:flex;z-index:5}
#modals{position:fixed;inset:0;z-index:100;pointer-events:none}
#modals .mbg{pointer-events:all}
.nbtn{flex:1;border:none;background:none;color:var(--mut);padding:8px 0;cursor:pointer;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;touch-action:manipulation;font-family:inherit}
.nbtn.on{color:var(--acc)}
.ico{font-size:19px;line-height:1}
input,select{background:var(--c2);border:1px solid var(--bor);color:var(--txt);border-radius:8px;padding:9px 12px;font-size:15px;outline:none;width:100%;-webkit-appearance:none;font-family:inherit}
input:focus,select:focus{border-color:var(--acc)}
select option{background:var(--card)}
.btn{border:none;border-radius:8px;cursor:pointer;font-weight:600;padding:9px 14px;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation;font-family:inherit;-webkit-appearance:none}
.btn:active{opacity:.65}
.ba{background:var(--acc);color:#000}
.bh{background:var(--c2);color:var(--txt);border:1px solid var(--bor)}
.bg{background:#0e4a2e;color:var(--grn);border:1px solid #1a6b42}
.bb{background:#0e2a4a;color:var(--blu);border:1px solid #1a4a7a}
.br{background:#7b1c2f;color:#fca5a5}
.bw{background:var(--wa);color:#fff}
.bp{background:#2a1a4a;color:var(--pur);border:1px solid #4a2a7a}
.card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:14px}
.ta{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#0e3a1e;color:var(--grn)}
.tp{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#0e1e38;color:var(--blu)}
.tx{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#2a1a4a;color:var(--pur)}
.mn{font-family:'Courier New',monospace}
.sep{height:1px;background:var(--bor);margin:10px 0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.kpi{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:12px}
.lrow{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;color:var(--mut);margin-bottom:4px;font-weight:500}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:18px;-webkit-overflow-scrolling:touch}
.pbar{background:var(--c2);border-radius:20px;height:8px;overflow:hidden;margin-bottom:4px}
.pf{background:var(--grn);height:100%;border-radius:20px}
.pvb{background:#0a2a12;border:1px solid #1a5a2a;border-radius:10px;padding:12px;white-space:pre-wrap;font-size:12px;color:#c8f0d8;line-height:1.6;max-height:200px;overflow-y:auto;margin-top:8px}
.dg{border:1px solid var(--bor);border-radius:12px;margin-bottom:10px;overflow:hidden}
.dh{background:var(--c2);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;touch-action:manipulation}
.db{padding:12px 14px}
.cp{background:var(--c2);color:var(--blu);border:1px solid var(--blu);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-weight:600;touch-action:manipulation;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
.cp.ok{background:#0e3a1e;color:var(--grn);border-color:var(--grn)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px}
/* Toast */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#0e4a2e;border:1px solid var(--grn);color:var(--grn);padding:10px 20px;border-radius:24px;font-size:14px;font-weight:600;z-index:300;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Cobros urgency row borders */
.dg-vencido{border-color:#7b1c2f!important}
.dg-hoy{border-color:var(--acc)!important}
.dg-pronto{border-color:#2a4a1a!important}
.dh-vencido{background:#2a0a12!important}
.dh-hoy{background:#1a2a00!important}
.dh-pronto{background:#0a1a08!important}
.dn-vencido{background:#7b1c2f!important;color:#fca5a5!important}
.dn-hoy{background:var(--acc)!important;color:#000!important}
.dn-pronto{background:#0e4a2e!important;color:var(--grn)!important}
/* Quick pay button in collapsed row */
.qpay{border:none;border-radius:8px;cursor:pointer;font-weight:700;padding:10px 14px;font-size:13px;background:var(--acc);color:#000;touch-action:manipulation;font-family:inherit;flex-shrink:0;min-width:72px;-webkit-appearance:none}
.qpay:active{opacity:.65}
/* ── Floating calculator button ── */
#btn-calc{position:fixed;bottom:78px;left:14px;width:50px;height:50px;border-radius:50%;border:none;background:linear-gradient(135deg,#9b6dff 0%,#6a3fbf 100%);color:#fff;font-size:22px;cursor:pointer;z-index:90;box-shadow:0 4px 18px rgba(155,109,255,.5);display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s,bottom .2s ease-out,opacity .3s;font-family:inherit}
#btn-calc:active{transform:scale(.86);box-shadow:0 2px 8px rgba(155,109,255,.3)}
#btn-calc.raised{bottom:140px}
/* ── Cobros selector: checkbox circular ── */
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--bor);background:var(--card);color:var(--mut);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background .15s,border-color .15s,color .15s;font-family:inherit;padding:0}
.chk:active{transform:scale(.9)}
.chk.on{background:var(--acc);border-color:var(--acc);color:#000}
/* ── Floating sum bar (above navbar) ── */
#sumbar{position:fixed;bottom:60px;left:0;right:0;max-width:600px;margin:0 auto;background:linear-gradient(135deg,#0e2a4a 0%,#1a3a6a 100%);border-top:2px solid var(--blu);padding:10px 14px;z-index:80;display:none;box-shadow:0 -4px 16px rgba(0,0,0,.4);transform:translateY(100%);transition:transform .2s ease-out}
#sumbar.on{display:flex;align-items:center;justify-content:space-between;gap:10px;transform:translateY(0)}
#sumbar .sb-info{display:flex;flex-direction:column;flex:1;min-width:0}
#sumbar .sb-count{font-size:11px;color:#9bc4e8;text-transform:uppercase;letter-spacing:.5px}
#sumbar .sb-total{font-family:'Courier New',monospace;font-weight:700;font-size:17px;color:#fff;line-height:1.2}
#sumbar .sb-clear{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;flex-shrink:0}
#sumbar .sb-clear:active{opacity:.6}
/* ── Calculator modal internals ── */
.calc-res{background:var(--c2);border:1px solid var(--bor);border-radius:10px;overflow:hidden;margin-top:4px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--bor)}
.calc-row:last-child{border-bottom:none}
.calc-lbl{font-size:12px;color:var(--mut);flex:1}
.calc-val{font-family:'Courier New',monospace;font-weight:700;font-size:13px;text-align:right}
.calc-sep{height:1px;background:linear-gradient(90deg,transparent,var(--pur),transparent);margin:2px 0}
/* ── LIGHT THEME (automatic via system preference) ── */
@media(prefers-color-scheme:light){
  :root{--bg:#f0f4f8;--card:#ffffff;--c2:#e8ecf2;--bor:#d0d8e4;--txt:#1a2a3a;--mut:#6a7a8a;--grn:#18a858;--red:#d03055;--blu:#1a6fd0;--pur:#7744ee;
  --c-info-bg:#e8f0fb;--c-suc-bg:#e8f8ed;--c-suc-bor:#7ae0aa;--c-suc-bor2:#50c880;--c-warn-bg:#fff0e8;--c-day-bg:#fef8e0;--c-paid-bg:#d8f5e8;--c-jul-bg:#e8f8e8;--c-jul-bor:#7ae0aa;--c-jul-txt:#1a7a40;--c-amber-bg:#fff8e0;--c-amber-txt:#9a6000;--c-danger-bg:#fce8ec;--c-danger-txt:#b02040;--c-rf-bg:linear-gradient(135deg,#f0ebff 0%,#e8eeff 100%);--c-kpi2-bg:rgba(0,0,0,.06);--c-urg-hoy:#fff8e0;--c-urg-past:#e8f0ff;--c-sem-ok-bg:#d8f5e8;--c-sem-bad-bg:#fce8ec;--c-sem-partial-bg:#fff8e0;--c-sem-partial-txt:#9a6000;
  --chart-line:#c8d4e4;--chart-past-bar:#2a6fc0;--chart-past-val:#3a6a9a;--chart-past-lbl:#5a7a8a}
  html,body{background:var(--bg)}
  #topbar{background:linear-gradient(135deg,#ffffff 0%,#f0f4f8 100%)}
  .bg{background:#d0f0dc;color:#1a7a40;border-color:#50c880}
  .bb{background:#d8ecff;color:#1a5aaa;border-color:#7ab0e8}
  .br{background:#fce8ec;color:#b02040;border-color:var(--red)}
  .bp{background:#f0ebff;color:#5a30c0;border-color:#9b6dff}
  .ta{background:#d0f0dc;color:#1a7a40}
  .tp{background:#d8ecff;color:#1a5aaa}
  .tx{background:#f0ebff;color:#5a30c0}
  .pvb{background:#f0fff4;border-color:#7ae0aa;color:#1a4a2a}
  .cp.ok{background:#d0f0dc;color:#1a7a40;border-color:var(--grn)}
  #toast{background:#d0f0dc;border-color:var(--grn);color:#1a7a40}
  select option{background:var(--card)}
  .dg-vencido{border-color:var(--red)!important}
  .dg-pronto{border-color:var(--grn)!important}
  .dh-vencido{background:#fce8ec!important}
  .dh-hoy{background:#fef8e0!important}
  .dh-pronto{background:#e8f8ed!important}
  .dn-vencido{background:var(--red)!important;color:#fff!important}
  .dn-pronto{background:var(--grn)!important;color:#fff!important}
  #sumbar{background:linear-gradient(135deg,#d8e8ff 0%,#c0d8ff 100%);border-top-color:var(--blu)}
  #sumbar .sb-count{color:#3a6a9a}
  #sumbar .sb-total{color:var(--txt)}
  #sumbar .sb-clear{background:rgba(26,111,208,.1);border-color:rgba(26,111,208,.3);color:var(--txt)}
}
/* ── Login / Firebase overlays ── */
#login,#fb-loading{font-family:-apple-system,'Segoe UI',system-ui,sans-serif}
#login input{margin-bottom:2px}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<body>
<div id="app">
  <div id="topbar">
    <div>
      <div style="font-weight:700;font-size:16px;color:var(--acc);letter-spacing:.3px">💼 JiTel Capital</div>
      <div id="tsub" style="font-size:11px;color:var(--mut)">Cargando...</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
    <span id="sync-ind" title="Modo local" style="font-size:13px;opacity:.55;cursor:default;transition:opacity .3s">💾</span>
    <button class="btn bh" id="btn-alerts" style="font-size:16px;padding:6px 10px;position:relative">🔔</button>
    <button class="btn ba" id="btn-new" style="font-size:12px;padding:7px 13px">+ Nuevo</button>
  </div>
  </div>
  <div id="content"></div>
  <div id="navbar"></div>
</div>
<div id="modals"></div>
<button id="btn-calc" title="Calculadora de préstamo">🧮</button>
<div id="sumbar">
  <div class="sb-info" id="sb-info">
    <!-- Filled dynamically by sumRefreshBar — single or multi-line -->
  </div>
  <button class="sb-clear" id="sb-clear">✕ Limpiar</button>
</div>
<canvas id="cvs" style="display:none"></canvas>

<script>
// ── UTILS ──
var COP=function(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);};
var PCT=function(n){return ((n||0)*100).toFixed(1)+'%';};
var GID=function(){return Math.random().toString(36).slice(2)+Date.now().toString(36);};
var TODAY=new Date();
var MESES=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
var TODAY_DIA=TODAY.getDate();
var CURR_MK=TODAY.getFullYear()+'-'+String(TODAY.getMonth()+1).padStart(2,'0');
function isoToday(){
  // Use local date components to avoid UTC midnight crossing (Colombia = UTC-5)
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function hoyStr(){return new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});}
// Parse YYYY-MM-DD as LOCAL date to avoid UTC offset bugs
function parseLocalDate(s){if(!s||typeof s!=='string')return null;var p=s.slice(0,10).split('-');return p.length===3?new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])):null;}
// Julian rule: if int_socio=0, all interest is propio (no external partner cost)
function IM(l){return l.monto*((+l.int_socio)+(+l.int_propio));}
function IS(l){return l.monto*(+l.int_socio);}
function IP(l){return l.monto*(+l.int_propio);}
// Effective interest shown to client = int_socio + int_propio always
function cobrarCliente(l){return IM(l);}
// Unified Julian detection: a loan is "direct to owner" when int_socio is 0 AND socio is JULIAN.
// This prevents false positives (otro socio with 0% by mistake) and false negatives (typo in name).
function isJulianLoan(l){return (+l.int_socio===0)&&(l.socio||'').toUpperCase()==='JULIAN';}
function paidMth(l){
  var p=l.pagos||[],i,tm=TODAY.getMonth(),ty=TODAY.getFullYear();
  for(i=0;i<p.length;i++){var d=parseLocalDate(p[i].fecha);if(d&&d.getMonth()===tm&&d.getFullYear()===ty)return true;}
  return false;
}

// ── TOAST ──
function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg;t.className='show';
  clearTimeout(t._to);t._to=setTimeout(function(){t.className='';},2000);
}

// ── PAYMENT CONFIRMATION MODAL ──
// Shows a summary of the payment(s) about to be registered. Only on ✓ Listo the callback fires.
function showPaymentConfirm(loans,dia,onConfirm){
  var m=D('modal',null,null);
  var hdr=D(null,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'},null);
  var h2=document.createElement('h2');h2.style.cssText='color:var(--acc);font-size:17px';
  h2.textContent=loans.length===1?'Confirmar pago':'Confirmar '+loans.length+' pagos';
  hdr.appendChild(h2);hdr.appendChild(BTN('bh','✕',closeModal,null));m.appendChild(hdr);
  var sub=D(null,{fontSize:'12px',color:'var(--mut)',marginBottom:'12px'},null);
  sub.textContent='Revisa los detalles antes de guardar. Aún no se registra nada.';
  m.appendChild(sub);
  var tot=0,i;
  var box=D(null,{background:'var(--c2)',borderRadius:'10px',padding:'12px',marginBottom:'14px'},null);
  for(i=0;i<loans.length;i++){
    var ln=loans[i],amt=Math.round(IM(ln));tot+=amt;
    var row=D(null,{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:i<loans.length-1?'1px solid var(--bor)':'none'},null);
    var lft=D(null,{flex:'1',minWidth:'0'},null);
    var n1=D(null,{fontWeight:'600',fontSize:'13px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'},null);n1.textContent=ln.socio||ln.responsable;
    var n2=D(null,{fontSize:'11px',color:'var(--mut)'},null);n2.textContent='Día '+dia+' · Interés '+COP(IS(ln))+' + '+COP(IP(ln));
    lft.appendChild(n1);lft.appendChild(n2);
    var rgt=S('mn',{fontWeight:'700',color:'var(--acc)',fontSize:'14px',marginLeft:'10px'},null);rgt.textContent=COP(amt);
    row.appendChild(lft);row.appendChild(rgt);box.appendChild(row);
  }
  if(loans.length>1){
    var totRow=D(null,{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0 0',marginTop:'8px',borderTop:'2px solid var(--acc)'},null);
    var tl2=D(null,{fontWeight:'700',fontSize:'13px',color:'var(--acc)'},null);tl2.textContent='TOTAL';
    var tv2=S('mn',{fontWeight:'700',color:'var(--acc)',fontSize:'16px'},null);tv2.textContent=COP(tot);
    totRow.appendChild(tl2);totRow.appendChild(tv2);box.appendChild(totRow);
  }
  m.appendChild(box);
  var dateBox=D(null,{fontSize:'12px',color:'var(--mut)',marginBottom:'14px',textAlign:'center'},null);
  dateBox.textContent='📅 Fecha: '+isoToday();
  m.appendChild(dateBox);
  var brow=D(null,{display:'flex',gap:'8px'},null);
  brow.appendChild(BTN('bh','Cancelar',closeModal,{flex:'1'}));
  brow.appendChild(BTN('bg','✓ Listo',function(){closeModal();onConfirm();},{flex:'2'}));
  m.appendChild(brow);
  showModal(m);
}

// ── CONFIRMATION MODAL (reusable) ──
// Shows a clear confirm dialog and calls onConfirm only if user taps Confirm.
// Replaces native confirm() for destructive actions.
function showConfirm(opts){
  var title=opts.title||'¿Confirmar?';
  var msg=opts.msg||'Esta acción no se puede deshacer.';
  var confirmLbl=opts.confirmLbl||'Confirmar';
  var cancelLbl=opts.cancelLbl||'Cancelar';
  var danger=opts.danger!==false;
  var onConfirm=opts.onConfirm||function(){};
  var onCancel=opts.onCancel||function(){};
  var m=D('modal',{maxWidth:'420px'},null);
  var icoEl=D(null,{fontSize:'36px',textAlign:'center',marginBottom:'10px'},null);icoEl.textContent=danger?'⚠️':'❓';
  var ttl=D(null,{fontSize:'17px',fontWeight:'700',color:danger?'var(--red)':'var(--acc)',textAlign:'center',marginBottom:'8px'},null);ttl.textContent=title;
  var mEl=D(null,{fontSize:'13px',color:'var(--mut)',textAlign:'center',marginBottom:'16px',lineHeight:'1.5'},null);mEl.textContent=msg;
  m.appendChild(icoEl);m.appendChild(ttl);m.appendChild(mEl);
  var brow=D(null,{display:'flex',gap:'8px'},null);
  brow.appendChild(BTN('bh',cancelLbl,function(){closeModal();onCancel();},{flex:'1'}));
  brow.appendChild(BTN(danger?'br':'ba',confirmLbl,function(){closeModal();onConfirm();},{flex:'1'}));
  m.appendChild(brow);
  showModal(m);
}

// ── SMART DEFAULTS (most frequent int_socio/int_propio pair + responsable among active loans) ──
function getSmartDefaults(){
  var active=[],i;for(i=0;i<ST.loans.length;i++){if(ST.loans[i].status==='active')active.push(ST.loans[i]);}
  // Most frequent rate pair
  var rateMap={},bestRate=null,bestRateN=0;
  for(i=0;i<active.length;i++){
    var key=active[i].int_socio+'|'+active[i].int_propio;
    rateMap[key]=(rateMap[key]||0)+1;
    if(rateMap[key]>bestRateN){bestRateN=rateMap[key];bestRate=key;}
  }
  var defIs=0.035,defIp=0.015;
  if(bestRate){var parts=bestRate.split('|');defIs=parseFloat(parts[0]);defIp=parseFloat(parts[1]);}
  // Most frequent responsable
  var respMap={},bestResp='DAYAM',bestRespN=0;
  for(i=0;i<active.length;i++){
    var r=active[i].responsable||'';if(!r)continue;
    respMap[r]=(respMap[r]||0)+1;
    if(respMap[r]>bestRespN){bestRespN=respMap[r];bestResp=r;}
  }
  return{int_socio:defIs,int_propio:defIp,responsable:bestResp};
}

// ── STORAGE ──
var LSK='jitel_v1';
var ST={loans:[],archives:{}};
function loadST(){
  try{
    var r=localStorage.getItem(LSK);
    if(!r)return null;
    var p=JSON.parse(r);
    // Structural validation
    if(!p||typeof p!=='object')return null;
    if(!Array.isArray(p.loans))return null;
    if(!p.archives||typeof p.archives!=='object')p.archives={};
    // Sanitize each loan: ensure required numeric fields exist
    for(var i=0;i<p.loans.length;i++){
      var l=p.loans[i];
      if(!l.id)l.id=GID();
      if(!Array.isArray(l.pagos))l.pagos=[];
      if(typeof l.monto!=='number')l.monto=parseFloat(l.monto)||0;
      if(typeof l.int_socio!=='number')l.int_socio=parseFloat(l.int_socio)||0;
      if(typeof l.int_propio!=='number')l.int_propio=parseFloat(l.int_propio)||0;
      if(typeof l.dia!=='number')l.dia=parseInt(l.dia)||1;
      if(!l.status)l.status='active';
      // Conciliation flags — default false if absent (backward compat with older saves)
      if(typeof l.recibido!=='boolean')l.recibido=!!l.recibido;
      if(typeof l.pagado_socio!=='boolean')l.pagado_socio=!!l.pagado_socio;
    }
    return p;
  }catch(e){return null;}
}
// Always-on local write (the safety net — never removed during the Firebase transition).
function saveLocalOnly(){try{localStorage.setItem(LSK,JSON.stringify(ST));}catch(e){}}
// saveST keeps writing localStorage AND triggers a best-effort Firestore sync (admin only).
// Firestore sync never blocks the UI and never throws — if it fails, localStorage still has everything.
function saveST(){saveLocalOnly();if(typeof fbSyncDebounced==='function')fbSyncDebounced();}
// Sanitize a loan object loaded from any source (Firestore or localStorage) so the app's
// synchronous code can rely on numeric/boolean field types.
function sanitizeLoan(l){
  if(!l.id)l.id=GID();
  if(!Array.isArray(l.pagos))l.pagos=[];
  if(typeof l.monto!=='number')l.monto=parseFloat(l.monto)||0;
  if(typeof l.int_socio!=='number')l.int_socio=parseFloat(l.int_socio)||0;
  if(typeof l.int_propio!=='number')l.int_propio=parseFloat(l.int_propio)||0;
  if(typeof l.dia!=='number')l.dia=parseInt(l.dia)||1;
  if(!l.status)l.status='active';
  if(typeof l.recibido!=='boolean')l.recibido=!!l.recibido;
  if(typeof l.pagado_socio!=='boolean')l.pagado_socio=!!l.pagado_socio;
  return l;
}

// ── CANVAS IMAGE — paginada (máx 18 filas/página) ──
// onDone(dataUrls: string[]) — array de páginas para compartir por separado
function buildSocioImage(name,st,onDone){
  var cvs=document.getElementById('cvs');
  var loans=st.loans.slice().sort(function(a,b){return a.dia-b.dia;});
  var MAX_ROWS=10;
  var sc=Math.min(window.innerWidth,540)*2/480;
  var rH=Math.round(44*sc),hdH=Math.round(140*sc),pad=Math.round(22*sc);
  var cW=[Math.round(55*sc),Math.round(105*sc),Math.round(120*sc),Math.round(120*sc)];
  var tW=cW[0]+cW[1]+cW[2]+cW[3]+pad*2;
  var fs=Math.round(13*sc),fsS=Math.round(10*sc),fsL=Math.round(16*sc),fsXL=Math.round(21*sc);
  var totalPages=Math.ceil(loans.length/MAX_ROWS)||1;
  var dataUrls=[];var pagesDone=0;
  function renderPage(pageIdx){
    var startRow=pageIdx*MAX_ROWS;
    var endRow=Math.min(startRow+MAX_ROWS,loans.length);
    var rowCount=endRow-startRow;
    var isLast=(pageIdx===totalPages-1);
    var H=hdH+rH*(rowCount+1)+(isLast?rH:0)+Math.round(36*sc);
    cvs.width=tW;cvs.height=H;
    var ctx=cvs.getContext('2d');
    ctx.fillStyle='#07111e';ctx.fillRect(0,0,tW,H);
    ctx.fillStyle='#0d1e33';
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(pad/2,pad/2,tW-pad,hdH-pad/2,Math.round(12*sc));ctx.fill();}
    else{ctx.fillRect(pad/2,pad/2,tW-pad,hdH-pad/2);}
    // Brand
    ctx.font='bold '+fsXL+'px -apple-system,sans-serif';ctx.fillStyle='#e9a020';ctx.textAlign='left';
    ctx.fillText('💼 JiTel Capital',pad*1.2,pad*1.8);
    ctx.font='bold '+fsL+'px -apple-system,sans-serif';ctx.fillStyle='#d8e8f5';
    ctx.fillText('Resumen: '+name,pad*1.2,pad*1.8+Math.round(28*sc));
    ctx.font=Math.round(11*sc)+'px -apple-system,sans-serif';ctx.fillStyle='#5a7a9a';
    ctx.fillText(hoyStr()+' · '+st.count+' préstamos · Pág.'+(pageIdx+1)+'/'+totalPages,pad*1.2,pad*1.8+Math.round(50*sc));
    // Totals bar
    var tbY=pad*1.8+Math.round(72*sc);
    ctx.fillStyle='#112240';
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(pad*1.2,tbY,tW-pad*2.4,Math.round(38*sc),Math.round(8*sc));ctx.fill();}
    else ctx.fillRect(pad*1.2,tbY,tW-pad*2.4,Math.round(38*sc));
    ctx.font='bold '+Math.round(12*sc)+'px -apple-system,sans-serif';ctx.fillStyle='#5a7a9a';ctx.textAlign='left';
    ctx.fillText('Capital: ',pad*1.8,tbY+Math.round(25*sc));
    ctx.fillStyle='#e9a020';ctx.fillText(COP(st.capital),pad*1.8+Math.round(55*sc),tbY+Math.round(25*sc));
    ctx.fillStyle='#5a7a9a';ctx.fillText('  Tu interés/mes: ',pad*1.8+Math.round(165*sc),tbY+Math.round(25*sc));
    ctx.fillStyle='#f04f70';ctx.fillText(COP(st.intS),pad*1.8+Math.round(295*sc),tbY+Math.round(25*sc));
    // Table header
    var tY=hdH;
    ctx.fillStyle='#112240';ctx.fillRect(0,tY,tW,rH);
    var hcols=['DÍA','MES FIN','CAPITAL','INT. SOCIO/MES'],cx=pad,cIdx;
    ctx.font='bold '+fsS+'px -apple-system,sans-serif';ctx.fillStyle='#5a7a9a';ctx.textAlign='center';
    for(cIdx=0;cIdx<hcols.length;cIdx++){ctx.fillText(hcols[cIdx],cx+cW[cIdx]/2,tY+rH*0.65);cx+=cW[cIdx];}
    // Data rows para esta página
    for(var ri=0;ri<rowCount;ri++){
      var l=loans[startRow+ri];var rY=tY+rH*(ri+1);
      ctx.fillStyle=ri%2===0?'#0d1e33':'#0a1928';ctx.fillRect(0,rY,tW,rH);
      ctx.strokeStyle='#1c3455';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,rY);ctx.lineTo(tW,rY);ctx.stroke();
      var vals=[String(l.dia),l.mes_fin,COP(l.monto),COP(IS(l))];
      cx=pad;
      for(cIdx=0;cIdx<vals.length;cIdx++){
        ctx.textAlign='center';
        if(cIdx===3){
          // Línea 1: valor en pesos (INT. SOCIO/MES)
          ctx.font='bold '+fs+'px -apple-system,sans-serif';ctx.fillStyle='#f04f70';
          ctx.fillText(vals[cIdx],cx+cW[cIdx]/2,rY+rH*0.44);
          // Línea 2: porcentaje en texto pequeño gris
          ctx.font=Math.round(10*sc)+'px -apple-system,sans-serif';ctx.fillStyle='#5a7a9a';
          ctx.fillText('('+(l.int_socio*100).toFixed(1)+'%)',cx+cW[cIdx]/2,rY+rH*0.78);
        }else{
          ctx.font=(cIdx>=2?'bold ':'')+fs+'px -apple-system,sans-serif';
          ctx.fillStyle='#d8e8f5';ctx.fillText(vals[cIdx],cx+cW[cIdx]/2,rY+rH*0.65);
        }
        cx+=cW[cIdx];
      }
    }
    // Total row — solo en la última página
    if(isLast){
      var totY=tY+rH*(rowCount+1);
      ctx.fillStyle='#1c3455';ctx.fillRect(0,totY,tW,rH);
      ctx.strokeStyle='#e9a020';ctx.lineWidth=Math.round(2*sc);ctx.beginPath();ctx.moveTo(0,totY);ctx.lineTo(tW,totY);ctx.stroke();
      cx=pad;
      ctx.font='bold '+fs+'px -apple-system,sans-serif';ctx.textAlign='center';
      ctx.fillStyle='#e9a020';ctx.fillText('TOTAL',cx+cW[0]/2,totY+rH*0.65);cx+=cW[0];cx+=cW[1];
      ctx.fillStyle='#e9a020';ctx.fillText(COP(st.capital),cx+cW[2]/2,totY+rH*0.65);cx+=cW[2];
      ctx.fillStyle='#f04f70';ctx.fillText(COP(st.intS),cx+cW[3]/2,totY+rH*0.65);
    }
    // Footer
    var lastRowBot=isLast?(tY+rH*(rowCount+2)):(tY+rH*(rowCount+1));
    ctx.font=Math.round(9*sc)+'px -apple-system,sans-serif';ctx.fillStyle='#2a3a4a';ctx.textAlign='center';
    ctx.fillText('JiTel Capital — '+hoyStr(),tW/2,lastRowBot+Math.round(16*sc));
    var dataUrl=cvs.toDataURL('image/png');
    dataUrls.push(dataUrl);pagesDone++;
    if(pagesDone<totalPages){renderPage(pageIdx+1);}else{onDone(dataUrls);}
  }
  renderPage(0);
}

// ── SUMADOR TEMPORAL (scoped per tab) ──
// Each scope returns a summary structure from its selected loans:
//   { kind:'single', label, total }                    — one-line bar
//   { kind:'multi',  title, lines:[{lbl,val,color?}] } — multi-line bar (tappable for desglose)
// Selections persist across re-renders within the same session; reset on reload.
var SUM_STATE={
  cobros:{ids:{},summary:function(loans){
    var t=0,i;for(i=0;i<loans.length;i++)t+=IM(loans[i]);
    return{kind:'single',label:'Total a cobrar',total:t};
  }},
  socios:{ids:{},summary:function(loans){
    var julians=[],others=[],i;
    for(i=0;i<loans.length;i++){if(isJulianLoan(loans[i]))julians.push(loans[i]);else others.push(loans[i]);}
    var ipJ=0,isS=0;
    for(i=0;i<julians.length;i++)ipJ+=IP(julians[i]);
    for(i=0;i<others.length;i++)isS+=IS(others[i]);
    if(julians.length>0&&others.length===0){
      return{kind:'single',label:'MI GANANCIA',total:ipJ};
    }
    if(others.length>0&&julians.length===0){
      return{kind:'single',label:'INTERÉS SOCIO',total:isS};
    }
    // Mixed
    return{kind:'multi',title:'RESUMEN MIXTO',lines:[
      {lbl:'MI GANANCIA ('+julians.length+')',val:COP(Math.round(ipJ)),color:'var(--grn)'},
      {lbl:'INTERÉS SOCIO ('+others.length+')',val:COP(Math.round(isS)),color:'var(--red)'}
    ]};
  }},
  loans:{ids:{},summary:function(loans){
    var ip=0,is=0,im=0,i;
    for(i=0;i<loans.length;i++){ip+=IP(loans[i]);is+=IS(loans[i]);im+=IM(loans[i]);}
    return{kind:'multi',title:'GANANCIA SELECCIONADA',expandable:true,lines:[
      {lbl:'MI GANANCIA',val:COP(Math.round(ip)),color:'var(--grn)'},
      {lbl:'Interés socios',val:COP(Math.round(is)),color:'var(--red)'},
      {lbl:'Cobro total',val:COP(Math.round(im)),color:'var(--acc)'}
    ]};
  }}
};

// ── TOAST WITH ACTION (sticky version for pay confirmation + WhatsApp) ──
// Standard showToast(msg) keeps working unchanged. This one accepts an optional action button.
function showToastAction(msg,actionLbl,actionFn,duration){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  clearTimeout(t._to);
  t.innerHTML='';
  var span=document.createElement('span');span.textContent=msg;t.appendChild(span);
  if(actionLbl&&actionFn){
    var b=document.createElement('button');b.type='button';
    b.style.cssText='margin-left:12px;background:rgba(45,216,122,.25);border:1px solid var(--grn);color:var(--grn);padding:5px 10px;border-radius:14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation';
    b.textContent=actionLbl;
    b.addEventListener('click',function(e){e.stopPropagation();actionFn();});
    t.appendChild(b);
  }
  t.className='show';
  var dur=duration||3500;
  t._to=setTimeout(function(){t.className='';},dur);
}

// ── PAGO FLOW ROUTER ──
// Centralizes the payment logic so all callers (quick-pay, expanded row, batch) share one path.
// - If PREFS.confirmPays === true → show payment confirm modal (current behavior)
// - If false (default) → register immediately + show toast with inline WhatsApp action
function doPagoFlow(loansOrLoan,dia,isBatch){
  var loans=Array.isArray(loansOrLoan)?loansOrLoan:[loansOrLoan];
  function commitPayments(){
    var pids={},li;for(li=0;li<loans.length;li++)pids[loans[li].id]=true;
    var nl=[],jj;
    for(jj=0;jj<ST.loans.length;jj++){
      var x=ST.loans[jj];
      if(pids[x.id]){
        var c={};for(var k in x)c[k]=x[k];c.pagos=(x.pagos||[]).slice();
        c.pagos.push({id:GID(),tipo:'interes',monto:Math.round(IM(x)),fecha:isoToday(),nota:'Interés día '+dia});
        c.recibido=true; // auto-marcar recibido al registrar pago
        nl.push(c);
      }else nl.push(x);
    }
    ST.loans=nl;saveST();renderApp();
  }
  if(PREFS.confirmPays){
    // Use existing modal flow — unchanged
    showPaymentConfirm(loans,dia,function(){
      commitPayments();
      var msg=loans.length===1?'✅ Pago registrado — '+(loans[0].socio||loans[0].responsable):'✅ Pagos registrados — día '+dia+' ('+loans.length+')';
      showToast(msg);
      showWaModal(loans,dia);
    });
  }else{
    // Fast path: register immediately, then toast with WhatsApp inline action
    commitPayments();
    var msg2=loans.length===1?'✅ Pago registrado — '+(loans[0].socio||loans[0].responsable):'✅ Pagos registrados ('+loans.length+')';
    showToastAction(msg2,'📲 WhatsApp',function(){
      // Build the same message that showWaModal would produce, then copy + open WhatsApp
      copyAndOpenWhatsApp(loans,dia);
    },4000);
  }
}

// ── COPY WHATSAPP MESSAGE TO CLIPBOARD ──
// Reuses the existing waSocioMsg / waClienteMsg templates without opening the modal.
// Single loan → cliente template. Multiple → grouped per-socio summary.
function copyAndOpenWhatsApp(loans,dia){
  var fecha=hoyStr();
  var text='';
  if(loans.length===1){
    var l=loans[0];
    // Use socio message if has external partner, else a simple receipt
    if(IS(l)>0){text=waSocioMsg(l.socio,dia,IS(l),fecha);}
    else{text='✅ PAGO REGISTRADO\nDía '+dia+' · '+fecha+'\n\nCliente: '+l.responsable+'\nCapital: '+COP(l.monto)+'\nInterés: '+COP(IM(l))+'\n\n¡Gracias por tu pago! 😊';}
  }else{
    // Multiple — group per socio
    var sm={},i,total=0;
    for(i=0;i<loans.length;i++){var ln=loans[i];if(!ln.socio||IS(ln)===0)continue;if(!sm[ln.socio])sm[ln.socio]={total:0,n:0};sm[ln.socio].total+=IS(ln);sm[ln.socio].n++;}
    for(i=0;i<loans.length;i++)total+=IM(loans[i]);
    var lines=['✅ PAGOS REGISTRADOS','Día '+dia+' · '+fecha,'','📋 '+loans.length+' préstamos','💵 Total: '+COP(total),''];
    var sns=Object.keys(sm);
    for(i=0;i<sns.length;i++){lines.push('• '+sns[i]+': '+COP(sm[sns[i]].total)+' ('+sm[sns[i]].n+' préstamos)');}
    text=lines.join('\n');
  }
  // Copy to clipboard
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      showToast('📋 Mensaje copiado al portapapeles');
    }).catch(function(){fallbackCopy(text);});
  }else{fallbackCopy(text);}
  // Open WhatsApp with text
  setTimeout(function(){
    var encoded=encodeURIComponent(text);
    window.open('https://wa.me/?text='+encoded,'_blank');
  },200);
}
function fallbackCopy(text){
  var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('📋 Mensaje copiado');}catch(e){showToast('⚠️ Copia manual');}
  document.body.removeChild(ta);
}

// ── MENSAJE MULTI-DÍA ──
// Genera un mensaje consolidado de pagos a un socio para un rango de días de cobro.
function showMensajeMultidia(groups){
  var cur=null;
  var desde=1,hasta=31;
  var socios2=[],socSet={},i2,l2;
  for(i2=0;i2<ST.loans.length;i2++){
    l2=ST.loans[i2];
    if(l2.status==='active'&&(!l2.mes_comienzo||l2.mes_comienzo<CURR_MK)&&l2.socio&&!isJulianLoan(l2)&&!socSet[l2.socio]){
      socios2.push(l2.socio);socSet[l2.socio]=1;
    }
  }
  socios2.sort();
  var selSocio=socios2.length>0?socios2[0]:'';
  var genMsg='';
  function calcMsg(){
    if(!selSocio)return'Selecciona un socio.';
    var daysFound=[],total=0,gi,li2;
    for(gi=0;gi<groups.length;gi++){
      var g=groups[gi];
      if(g.dia<desde||g.dia>hasta)continue;
      var dayAmt=0;
      for(li2=0;li2<g.loans.length;li2++){var ln=g.loans[li2];if(ln.socio===selSocio)dayAmt+=IS(ln);}
      if(dayAmt>0)daysFound.push({dia:g.dia,amt:dayAmt});
    }
    if(daysFound.length===0)return'Sin pagos de '+selSocio+' entre días '+desde+' y '+hasta+'.';
    var lines=['Hola '+selSocio+', el resumen de pagos días '+desde+' al '+hasta+':'];
    for(var di=0;di<daysFound.length;di++){total+=daysFound[di].amt;lines.push('Día '+daysFound[di].dia+': '+COP(daysFound[di].amt));}
    lines.push('Total: '+COP(total));
    lines.push('Gracias 🤝');
    return lines.join('\n');
  }
  function render(){
    var m=D('modal',null,null);
    var hdr=D(null,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'},null);
    var h2=document.createElement('h2');h2.style.cssText='color:var(--acc);font-size:17px';h2.textContent='📋 Mensaje multi-día';
    hdr.appendChild(h2);hdr.appendChild(BTN('bh','✕',closeModal,null));m.appendChild(hdr);
    var sub=D(null,{fontSize:'12px',color:'var(--mut)',marginBottom:'12px',lineHeight:'1.5'},null);
    sub.textContent='Genera un mensaje consolidado para enviarle a un socio el resumen de sus pagos en un rango de días.';m.appendChild(sub);
    if(socios2.length>0){
      var socOpts=[];for(var si=0;si<socios2.length;si++)socOpts.push([socios2[si],socios2[si]]);
      var socSel=MSEL(socOpts,selSocio);socSel.addEventListener('change',function(e){selSocio=e.target.value;genMsg='';refresh();});
      m.appendChild(FLD('Socio',socSel));
    }
    var desdeIn=INP({type:'number',value:String(desde),min:'1',max:'31'});desdeIn.addEventListener('input',function(e){desde=parseInt(e.target.value)||1;genMsg='';});
    var hastaIn=INP({type:'number',value:String(hasta),min:'1',max:'31'});hastaIn.addEventListener('input',function(e){hasta=parseInt(e.target.value)||31;genMsg='';});
    m.appendChild(R2(FLD('Desde día',desdeIn),FLD('Hasta día',hastaIn)));
    m.appendChild(BTN('ba','🔄 Generar mensaje',function(){genMsg=calcMsg();refresh();},{width:'100%',marginBottom:'10px'}));
    if(genMsg){
      var pvb=D('pvb',null,null);pvb.textContent=genMsg;m.appendChild(pvb);
      var mdBtnRow=D(null,{display:'flex',gap:'6px',marginTop:'8px'},null);
      mdBtnRow.appendChild(mkWaBtn(genMsg,{flex:'1'}));
      var cpBtn=mk('button','cp',null,null);cpBtn.textContent='📋 Copiar';cpBtn.addEventListener('click',function(){doCopy(genMsg,cpBtn);});
      mdBtnRow.appendChild(cpBtn);m.appendChild(mdBtnRow);
    }
    return m;
  }
  function refresh(){var nw=render();if(cur&&AM)replModal(cur,nw);else showModal(nw);cur=nw;}
  refresh();
}

// ── VIEW: COBROS ──
function vCobros(){
  var active=[],i;
  // Filter: only loans whose start month (mes_comienzo) is <= current month appear in Cobros.
  // mes_comienzo is stored as 'YYYY-MM' so string comparison works correctly.
  // Loans created today with a future start month are excluded from this view ONLY.
  // The active count in the topbar header (renderApp) is unaffected — it uses ST.loans directly.
  for(i=0;i<ST.loans.length;i++){
    var l0=ST.loans[i];
    if(l0.status!=='active')continue;
    if(l0.mes_comienzo&&l0.mes_comienzo>=CURR_MK)continue; // not yet started; first billing is the month after mes_comienzo
    active.push(l0);
  }
  var gm={};for(i=0;i<active.length;i++){var l=active[i];if(!gm[l.dia])gm[l.dia]={dia:l.dia,loans:[],total:0,pagado:0};gm[l.dia].loans.push(l);gm[l.dia].total+=IM(l);if(paidMth(l))gm[l.dia].pagado+=IM(l);}
  var groups=[];var dks=Object.keys(gm);for(i=0;i<dks.length;i++)groups.push(gm[dks[i]]);groups.sort(function(a,b){return a.dia-b.dia;});
  var tm=0,tc=0,myPending=0,myPaid=0;
  for(i=0;i<groups.length;i++){tm+=groups[i].total;tc+=groups[i].pagado;}
  // MI CUENTA: interés propio dividido entre préstamos cobrados y pendientes este mes.
  for(i=0;i<active.length;i++){if(paidMth(active[i]))myPaid+=IP(active[i]);else myPending+=IP(active[i]);}
  var pct=tm>0?Math.round(tc/tm*100):0;

  // helper: urgency class for a day group
  // A day group is 'vencido' only if its dia < TODAY_DIA — meaning it was due earlier THIS month.
  // Loans due in a future month (mes_fin) are never vencido regardless of dia.
  function urgency(g,allPaid){
    if(allPaid)return'paid';
    var diff=g.dia-TODAY_DIA;
    if(diff===0)return'hoy';
    if(diff>0&&diff<=2)return'pronto';
    if(diff<0)return'vencido';   // dia < today: overdue this cycle
    return'future';
  }

  var w=D(null,null,null);
  var h2=document.createElement('h2');h2.style.cssText='color:var(--acc);font-size:20px;margin-bottom:12px';h2.textContent='Cobros del mes';w.appendChild(h2);
  // 3-column KPI grid: TOTAL MES / COBRADO / MI CUENTA
  function fmtM(n){var m=n/1000000;return m>=1?m.toFixed(2).replace(/\.?0+$/,'')+'M':Math.round(n/1000)+'k';}
  var kg=D(null,{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'10px'},null);
  function mkKpi(l,v,vc,sub){var k=D('kpi',{padding:'10px'},null);var kl=D(null,{fontSize:'9px',color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'3px'},null);kl.textContent=l;var kv=D('mn',{fontSize:'13px',fontWeight:'700',color:vc||'var(--acc)',lineHeight:'1.2',wordBreak:'break-word'},null);kv.textContent=v;k.appendChild(kl);k.appendChild(kv);if(sub){var ks=D(null,{fontSize:'10px',color:'var(--mut)',marginTop:'2px'},null);ks.textContent=sub;k.appendChild(ks);}return k;}
  kg.appendChild(mkKpi('TOTAL MES',COP(tm),'var(--acc)',null));
  kg.appendChild(mkKpi('COBRADO',COP(tc),'var(--grn)',COP(tm-tc)+' pend.'));
  kg.appendChild(mkKpi('MI CUENTA',COP(myPaid+myPending),'var(--pur)','cobrado '+fmtM(myPaid)+' · pend. '+fmtM(myPending)));
  w.appendChild(kg);

  var bw=D(null,{marginBottom:'10px'},null);var br=D('pbar',null,null);br.appendChild(D('pf',{width:pct+'%'},null));var bl=D(null,{fontSize:'11px',color:'var(--mut)',textAlign:'right'},null);bl.textContent=pct+'% cobrado este mes';bw.appendChild(br);bw.appendChild(bl);w.appendChild(bw);

  // ── Banner de pendientes acumulados (todos los días del mes, misma lógica pend/done: !paidMth) ──
  // pendGroups se llena en el loop de grupos; "Ver todos" expande cada día con pendientes y hace scroll.
  var pendGroups=[];
  var accPendTot=0,accPendCnt=0,api;
  for(api=0;api<active.length;api++){if(!paidMth(active[api])){accPendTot+=IM(active[api]);accPendCnt++;}}
  if(accPendCnt>0){
    var pbn=D(null,{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'10px',background:'var(--c-danger-bg)',border:'1px solid var(--red)',borderRadius:'10px',padding:'10px 12px',marginBottom:'14px'},null);
    var pbnL=D(null,{flex:'1',minWidth:'0'},null);
    var pbnT=D(null,{fontSize:'13px',fontWeight:'700',color:'var(--c-danger-txt)'},null);pbnT.textContent='⚠️ Pendientes acumulados';
    var pbnV=D('mn',{fontSize:'15px',fontWeight:'700',color:'var(--c-danger-txt)',marginTop:'2px'},null);pbnV.textContent=COP(accPendTot)+' · '+accPendCnt+' préstamo'+(accPendCnt!==1?'s':'');
    pbnL.appendChild(pbnT);pbnL.appendChild(pbnV);
    pbn.appendChild(pbnL);
    pbn.appendChild(BTN('br','Ver todos',function(){
      var pgi;for(pgi=0;pgi<pendGroups.length;pgi++)pendGroups[pgi].expand();
      if(pendGroups.length>0)pendGroups[0].dg.scrollIntoView({behavior:'smooth',block:'start'});
    },{fontSize:'12px',padding:'8px 12px',flexShrink:'0'}));
    w.appendChild(pbn);
  }

  w.appendChild(BTN('bb','📋 Mensaje multi-día',function(){showMensajeMultidia(groups);},{width:'100%',marginBottom:'14px',fontSize:'12px'}));
  // Today's summary banner
  for(i=0;i<groups.length;i++){if(groups[i].dia===TODAY_DIA){var tp=[];var j;for(j=0;j<groups[i].loans.length;j++){if(!paidMth(groups[i].loans[j]))tp.push(groups[i].loans[j]);}if(tp.length>0){var ta=D(null,{background:'var(--c-day-bg)',border:'1px solid var(--acc)',borderRadius:'10px',padding:'12px',marginBottom:'14px'},null);var tal=D(null,{fontSize:'13px',fontWeight:'700',color:'var(--acc)'},null);tal.textContent='📅 HOY día '+TODAY_DIA+' — '+tp.length+' cobro'+(tp.length!==1?'s':'')+' pendiente'+(tp.length!==1?'s':'');var tt=0;for(j=0;j<tp.length;j++)tt+=IM(tp[j]);var tav=D('mn',{fontSize:'16px',fontWeight:'700'},null);tav.textContent=COP(tt);ta.appendChild(tal);ta.appendChild(tav);w.appendChild(ta);}break;}}

  for(var gi=0;gi<groups.length;gi++){
    (function(g){
      var pend=[],done=[];for(var pi=0;pi<g.loans.length;pi++){if(paidMth(g.loans[pi]))done.push(g.loans[pi]);else pend.push(g.loans[pi]);}
      var allPaid=pend.length===0;
      var urg=urgency(g,allPaid);

      // ── Urgency-based styling ──

// ── CHART: EVOLUCIÓN DE LA CARTERA ──
function vEvolucion(){
  // Build monthly data from ST.archives + current month
  var archKeys=Object.keys(ST.archives||{}).sort();
  var allMonths=archKeys.slice();
  if(allMonths.indexOf(CURR_MK)<0)allMonths.push(CURR_MK);
  allMonths.sort();
  var months=allMonths.slice(-6);
  var mNames=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  var loanById={},i,j,k;
  for(i=0;i<ST.loans.length;i++)loanById[ST.loans[i].id]=ST.loans[i];
  var data=[];
  for(var mi=0;mi<months.length;mi++){
    var mk=months[mi];var totalIP=0,totalCap=0,cnt=0;
    if(mk===CURR_MK){
      for(j=0;j<ST.loans.length;j++){var l=ST.loans[j];if(l.status==='active'){totalIP+=IP(l);totalCap+=l.monto;cnt++;}}
    }else{
      var arc=ST.archives[mk]||{};var lids=Object.keys(arc);
      for(k=0;k<lids.length;k++){
        var lid=lids[k];var pagos=arc[lid]||[];var hasInt=false;
        for(var p=0;p<pagos.length;p++){if(pagos[p].tipo==='interes'){hasInt=true;break;}}
        if(!hasInt)continue;
        var loan=loanById[lid];if(!loan)continue;
        totalIP+=IP(loan);totalCap+=loan.monto;cnt++;
      }
    }
    var mIdx=parseInt(mk.split('-')[1])-1;
    data.push({mk:mk,label:mNames[mIdx]||mk,ip:totalIP,capital:totalCap,count:cnt});
  }
  // New loans per month by mes_comienzo
  var newByMk={};
  for(i=0;i<ST.loans.length;i++){var lmc=ST.loans[i].mes_comienzo;if(lmc)newByMk[lmc]=(newByMk[lmc]||0)+1;}

  var sec=D(null,{background:'var(--card)',border:'1px solid var(--bor)',borderRadius:'12px',padding:'14px',marginBottom:'16px'},null);
  var h3=D(null,{fontSize:'13px',fontWeight:'700',color:'var(--acc)',marginBottom:'10px'},null);
  h3.textContent='📈 Evolución de la cartera';sec.appendChild(h3);
  if(data.length<2){return null;}

  function getField(tab){return tab==='ganancia'?'ip':tab==='capital'?'capital':'count';}
  function fmtVal(v,tab){
    if(tab==='prestamos')return String(v||0);
    if(!v)return '$0';
    if(v>=1000000)return '$'+(v/1000000).toFixed(1)+'M';
    if(v>=1000)return '$'+Math.round(v/1000)+'K';
    return '$'+Math.round(v);
  }

  function buildChart(tab){
    var field=getField(tab);
    var values=[],ii;for(ii=0;ii<data.length;ii++)values.push(data[ii][field]||0);
    var maxVal=Math.max.apply(null,values)||1;
    var VW=400,VH=200,chartTop=14,chartBot=162,labelY=182;
    var n=data.length,slotW=VW/n,barW=Math.round(slotW*0.55);
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 '+VW+' '+VH);
    svg.setAttribute('preserveAspectRatio','none');
    svg.style.cssText='width:100%;height:200px;display:block';
    var base=document.createElementNS('http://www.w3.org/2000/svg','line');
    base.setAttribute('x1','0');base.setAttribute('y1',String(chartBot));
    base.setAttribute('x2',String(VW));base.setAttribute('y2',String(chartBot));
    base.style.stroke='var(--chart-line)';base.setAttribute('stroke-width','1');svg.appendChild(base);
    for(var bi=0;bi<data.length;bi++){
      var d=data[bi],val=d[field]||0,isCurr=(d.mk===CURR_MK);
      var barColor=isCurr?'var(--acc)':'var(--chart-past-bar)';
      var valColor=isCurr?'var(--acc)':'var(--chart-past-val)';
      var lblColor=isCurr?'var(--acc)':'var(--chart-past-lbl)';
      var barH=Math.max(Math.round((val/maxVal)*(chartBot-chartTop-4)),2);
      var bx=Math.round(bi*slotW+(slotW-barW)/2),by=chartBot-barH;
      var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x',String(bx));rect.setAttribute('y',String(by));
      rect.setAttribute('width',String(barW));rect.setAttribute('height',String(barH));
      rect.setAttribute('rx','3');rect.style.fill=barColor;rect.setAttribute('opacity','0.9');
      svg.appendChild(rect);
      var vt=document.createElementNS('http://www.w3.org/2000/svg','text');
      vt.setAttribute('x',String(bx+barW/2));vt.setAttribute('y',String(by-3));
      vt.setAttribute('text-anchor','middle');vt.setAttribute('font-size','9');
      vt.style.fill=valColor;vt.setAttribute('font-weight','bold');
      vt.textContent=fmtVal(val,tab);svg.appendChild(vt);
      var lt=document.createElementNS('http://www.w3.org/2000/svg','text');
      lt.setAttribute('x',String(bx+barW/2));lt.setAttribute('y',String(labelY));
      lt.setAttribute('text-anchor','middle');lt.setAttribute('font-size','9');
      lt.style.fill=lblColor;lt.textContent=d.label;svg.appendChild(lt);
    }
    return svg;
  }

  function buildIndicators(tab){
    var field=getField(tab);
    var wrap=D(null,{display:'flex',flexDirection:'column',gap:'6px'},null);
    var currIdx=-1,ii;
    for(ii=0;ii<data.length;ii++){if(data[ii].mk===CURR_MK){currIdx=ii;break;}}
    if(currIdx<0)currIdx=data.length-1;
    var currVal=(data[currIdx]?data[currIdx][field]:0)||0;
    var prevVal=(currIdx>0?data[currIdx-1][field]:0)||0;
    var diff=currVal-prevVal;
    var varRow=D(null,{fontSize:'12px'},null);
    if(diff>=0){varRow.style.color='var(--grn)';varRow.textContent='↑ +'+fmtVal(diff,tab)+' vs mes anterior';}
    else{varRow.style.color='var(--red)';varRow.textContent='↓ -'+fmtVal(Math.abs(diff),tab)+' vs mes anterior';}
    wrap.appendChild(varRow);
    var bestIdx=0,jj;
    for(jj=1;jj<data.length;jj++){if((data[jj][field]||0)>(data[bestIdx][field]||0))bestIdx=jj;}
    var bestRow=D(null,{fontSize:'12px',color:'var(--mut)'},null);
    bestRow.textContent='🏆 Mejor mes: '+data[bestIdx].label+' con '+fmtVal(data[bestIdx][field]||0,tab);
    wrap.appendChild(bestRow);
    var currNew=newByMk[CURR_MK]||0,prevMk=currIdx>0?data[currIdx-1].mk:null,prevNew=prevMk?(newByMk[prevMk]||0):0;
    var newRow=D(null,{fontSize:'12px',color:'var(--mut)'},null);
    newRow.textContent='🆕 Nuevos este mes: '+currNew+(prevMk?' · mes anterior: '+prevNew:'');
    wrap.appendChild(newRow);
    return wrap;
  }

  var activeTab='ganancia';
  var tabBtns={};
  var tabBar=D(null,{display:'flex',gap:'6px',marginBottom:'12px'},null);
  var chartWrap=D(null,null,null);
  var indicatorsWrap=D(null,{marginTop:'10px',paddingTop:'10px',borderTop:'1px solid var(--bor)'},null);

  function refreshChart(tab){
    var tn;for(tn in tabBtns){var tb=tabBtns[tn];if(tn===tab){tb.style.background='var(--acc)';tb.style.color='#000';tb.style.borderColor='var(--acc)';}else{tb.style.background='var(--c2)';tb.style.color='var(--mut)';tb.style.borderColor='var(--bor)';}}
    while(chartWrap.firstChild)chartWrap.removeChild(chartWrap.firstChild);
    chartWrap.appendChild(buildChart(tab));
    while(indicatorsWrap.firstChild)indicatorsWrap.removeChild(indicatorsWrap.firstChild);
    indicatorsWrap.appendChild(buildIndicators(tab));
  }

  var tabDefs=[['ganancia','Ganancia'],['capital','Capital'],['prestamos','Préstamos']];
  for(var ti=0;ti<tabDefs.length;ti++){
    (function(tabKey,tabLabel){
      var tb=document.createElement('button');tb.type='button';
      tb.style.cssText='flex:1;border:1px solid var(--bor);border-radius:8px;padding:8px 6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;min-height:40px;background:var(--c2);color:var(--mut);touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background .15s';
      tb.textContent=tabLabel;tabBtns[tabKey]=tb;
      tb.addEventListener('click',function(){activeTab=tabKey;refreshChart(activeTab);});
      tabBar.appendChild(tb);
    })(tabDefs[ti][0],tabDefs[ti][1]);
  }

  sec.appendChild(tabBar);sec.appendChild(chartWrap);sec.appendChild(indicatorsWrap);
  refreshChart(activeTab);
  return sec;
}

// ── VIEW: DASHBOARD ──
function vDashboard(){
  var active=[],i;for(i=0;i<ST.loans.length;i++){if(ST.loans[i].status==='active')active.push(ST.loans[i]);}
  var totCap=0,totP=0,totSoc=0,mora=0,myPaidR=0,myPendingR=0;
  for(i=0;i<active.length;i++){
    totCap+=active[i].monto;
    totP+=IP(active[i]);
    totSoc+=IS(active[i]);
    if(!paidMth(active[i])&&active[i].dia<TODAY_DIA)mora++;
    if(paidMth(active[i]))myPaidR+=IP(active[i]);else myPendingR+=IP(active[i]);
  }
  // Margen neto ponderado = Σ(monto_i × int_propio_i) / Σ(monto_i)
  // This IS a weighted average by capital — same as totP/totCap. Explicit here for clarity.
  var margenPonderado=totCap>0?totP/totCap:0;
  var archKeys=Object.keys(ST.archives||{}).sort().reverse();
  var w=D(null,null,null);
  // ── Header: Capital activo + botón Nuevo ──
  var trow=D(null,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'},null);
  var ttxt=D(null,null,null);
  var tlbl=D(null,{fontSize:'11px',color:'var(--mut)',textTransform:'uppercase',letterSpacing:'1px'},null);tlbl.textContent='Capital activo';
  var tval=D('mn',{fontSize:'28px',fontWeight:'700',color:'var(--acc)',lineHeight:'1.1'},null);tval.textContent=COP(totCap);
  ttxt.appendChild(tlbl);ttxt.appendChild(tval);
  trow.appendChild(ttxt);
  w.appendChild(trow);
  // ── 4 KPIs de Resumen (sin duplicar capital — ya está arriba) ──
  function bigKpi(lbl,val,vc,sub,icon){

function exportBackupCSV(){
  // Flatten all loans + their payments into rows
  // Columns: 13 loan + 2 concil + 5 pago = 20 total
  var lines=['id,año,dia,mes_fin,monto,socio,int_socio,int_propio,responsable,mes_comienzo,status,nota,created_at,recibido,pagado_socio,pago_id,pago_tipo,pago_monto,pago_fecha,pago_nota'];
  var i,j;
  for(i=0;i<ST.loans.length;i++){
    var l=ST.loans[i];
    function esc(v){var s=String(v===undefined||v===null?'':v);return s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0?'"'+s.replace(/"/g,'""')+'"':s;}
    var base=[l.id,l.año,l.dia,l.mes_fin,l.monto,l.socio,l.int_socio,l.int_propio,l.responsable,l.mes_comienzo,l.status,l.nota||'',l.created_at||'',l.recibido?'1':'0',l.pagado_socio?'1':'0'].map(esc).join(',');
    var pagos=l.pagos||[];
    if(pagos.length===0){lines.push(base+',,,,,');}
    else{for(j=0;j<pagos.length;j++){var p=pagos[j];lines.push(base+','+ [p.id,p.tipo,p.monto,p.fecha,p.nota||''].map(esc).join(','));}}
  }
  // Also store full JSON of archives as last special row for lossless restore
  var archJson=JSON.stringify(ST.archives||{}).replace(/"/g,'""');
  lines.push('"__ARCHIVES__","'+archJson+'",,,,,,,,,,,,,,,,,,');
  var csv=lines.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var d=new Date();
  a.href=url;a.download='JiTel_Backup_'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},10000);
  showToast('💾 Backup descargado');
}

function importBackupCSV(file,onDone){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      // Normalize CRLF → LF (Windows/Excel compatibility)
      var raw=e.target.result.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
      if(!raw||raw.trim().length<10){alert('Archivo vacío o inválido');return;}

      // RFC-4180 compliant parser: handles quoted fields with embedded newlines/commas/quotes
      function parseCSV(text){
        var rows=[],row=[],cur='',inQ=false,i,ch,nx;
        for(i=0;i<text.length;i++){
          ch=text[i];nx=text[i+1];
          if(inQ){
            if(ch==='"'){if(nx==='"'){cur+='"';i++;}else inQ=false;}
            else cur+=ch;
          } else {
            if(ch==='"'){inQ=true;}
            else if(ch===','){row.push(cur);cur='';}
            else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
            else cur+=ch;
          }
        }
        // Last field/row
        row.push(cur);if(row.some(function(f){return f!=='';}))rows.push(row);
        return rows;
      }

      var rows=parseCSV(raw);
      if(rows.length<2){alert('No se encontraron datos en el archivo');return;}

      // Header-based column mapping — supports both old (18-col) and new (20-col with recibido/pagado_socio) CSVs.
      var header=rows[0]||[];
      var col={};for(var hi=0;hi<header.length;hi++)col[(header[hi]||'').trim()]=hi;
      function g(row,name){var idx=col[name];return idx!==undefined?(row[idx]||''):'';}
      function gNum(row,name){return parseFloat(g(row,name))||0;}
      function gInt(row,name){return parseInt(g(row,name))||0;}
      function gBool(row,name){var v=g(row,name);return v==='1'||v==='true';}

      var loansMap={},archives={},skipped=0;
      for(var ri=1;ri<rows.length;ri++){
        var row=rows[ri];
        if(!row||!row[0]||row[0]==='')continue;
        if(row[0]==='__ARCHIVES__'){
          try{archives=JSON.parse(row[1]||'{}');}catch(er){archives={};}
          continue;
        }
        // Validate minimum column count — skip malformed rows with a counter
        if(row.length<13){skipped++;continue;}
        var lid=(g(row,'id')||row[0]).trim();
        if(!lid)continue;
        if(!loansMap[lid]){
          loansMap[lid]={
            id:lid,
            año:gInt(row,'año'),
            dia:gInt(row,'dia')||1,
            mes_fin:g(row,'mes_fin').trim(),
            monto:gNum(row,'monto'),
            socio:g(row,'socio').trim(),
            int_socio:gNum(row,'int_socio'),
            int_propio:gNum(row,'int_propio'),
            responsable:g(row,'responsable').trim(),
            mes_comienzo:g(row,'mes_comienzo').trim(),
            status:(g(row,'status')||'active').trim(),
            nota:g(row,'nota').trim(),
            created_at:g(row,'created_at').trim(),
            // New conciliation fields — default to false if absent in old CSVs
            recibido:gBool(row,'recibido'),
            pagado_socio:gBool(row,'pagado_socio'),
            pagos:[]
          };
        }
        // Add pago if present
        var pagoId=g(row,'pago_id').trim();
        if(pagoId){
          var already=false;
          for(var pi=0;pi<loansMap[lid].pagos.length;pi++){if(loansMap[lid].pagos[pi].id===pagoId){already=true;break;}}
          if(!already){
            loansMap[lid].pagos.push({
              id:pagoId,
              tipo:(g(row,'pago_tipo')||'interes').trim(),
              monto:gNum(row,'pago_monto'),
              fecha:(g(row,'pago_fecha')||isoToday()).trim(),
              nota:g(row,'pago_nota').trim()
            });
          }
        }
      }
      var loans=[];var keys=Object.keys(loansMap);
      for(var ki=0;ki<keys.length;ki++)loans.push(loansMap[keys[ki]]);
      if(loans.length===0){alert('No se encontraron préstamos válidos en el archivo'+(skipped?' ('+skipped+' filas omitidas por formato inválido)':''));return;}
      var msg='¿Restaurar backup?\n✅ '+loans.length+' préstamos encontrados.';
      if(skipped>0)msg+='\n⚠️ '+skipped+' filas omitidas (formato inválido).';
      msg+='\n\nEsto reemplazará todos los datos actuales.';
      if(!confirm(msg))return;
      ST.loans=loans;ST.archives=archives||{};saveST();renderApp();
      showToast('✅ Backup restaurado — '+loans.length+' préstamos'+(skipped?' ('+skipped+' filas omitidas)':''));
      if(onDone)onDone();
    }catch(err){alert('Error al procesar el archivo: '+err.message+'\n\nVerifica que sea el CSV exportado desde JiTel Capital.');}
  };
  reader.readAsText(file,'UTF-8');
}

function getAlerts() {
  var alerts = [], i, l;
  var active = [];
  for (i = 0; i < ST.loans.length; i++) { if (ST.loans[i].status === 'active') active.push(ST.loans[i]); }
  // Reuse module-level TODAY/TODAY_DIA instead of creating a new Date() on every call
  for (i = 0; i < active.length; i++) {
    l = active[i];
    if (paidMth(l)) continue;
    var diff = l.dia - TODAY_DIA;
    // Vence HOY
    if (diff === 0) {
      alerts.push({type:'hoy', loan:l, msg:'HOY — Cobrar a '+l.responsable+': '+COP(IM(l)), color:'var(--acc)', icon:'🔴'});
    }
    // Vence mañana
    else if (diff === 1) {
      alerts.push({type:'manana', loan:l, msg:'MAÑANA día '+l.dia+' — '+l.responsable+': '+COP(IM(l)), color:'var(--c-amber-txt)', icon:'🟡'});
    }
    // Vence en 2-3 días
    else if (diff >= 2 && diff <= 3) {
      alerts.push({type:'pronto', loan:l, msg:'En '+diff+' días (día '+l.dia+') — '+l.responsable+': '+COP(IM(l)), color:'var(--blu)', icon:'🔵'});
    }
    // Vencido (dia < hoy, sin pago)
    else if (diff < 0) {
      alerts.push({type:'vencido', loan:l, msg:'VENCIDO hace '+Math.abs(diff)+' día'+(Math.abs(diff)!==1?'s':'')+' — '+l.responsable+': '+COP(IM(l)), color:'var(--red)', icon:'⚠️'});
    }
  }
  // Sort: vencido first, hoy, manana, pronto
  var order = {vencido:0, hoy:1, manana:2, pronto:3};
  alerts.sort(function(a,b){ return (order[a.type]||9)-(order[b.type]||9); });
  return alerts;
}

// buildClienteImage — paginated, white background, WhatsApp-optimized (max 480px wide)
// onDone(dataUrls: string[]) — returns array of page dataUrls
function buildClienteImage(name, loans, onDone) {
  var cvs = document.getElementById('cvs');
  var sl = loans.slice().sort(function(a,b){ return a.dia - b.dia; });

  var MAX_ROWS = 10;
  var SCALE = 2; // retina
  var PW = 480; // logical px
  var pw = PW * SCALE; // canvas px

  // Layout constants (all in canvas px)
  var pad = 20 * SCALE;
  var hdH = 88 * SCALE;
  var rH  = 26 * SCALE;
  var fsHd = 15 * SCALE;
  var fsSub= 10 * SCALE;
  var fsCol= 9  * SCALE;
  var fsRow= 11 * SCALE;
  var fsFt = 8  * SCALE;

  // Column widths (canvas px): AÑO | DÍA | MES FIN | MONTO | SALDO FINAL
  var cW = [42*SCALE, 28*SCALE, 68*SCALE, 88*SCALE, 88*SCALE];
  var usedW = 0; for(var ci=0;ci<cW.length;ci++) usedW+=cW[ci];
  // Distribute remaining width evenly to MONTO & SALDO
  var extra = pw - pad*2 - usedW;
  cW[3] += Math.floor(extra/2);
  cW[4] += extra - Math.floor(extra/2);

  var totCap=0, totInt=0, i;
  for(i=0;i<sl.length;i++){totCap+=sl[i].monto; totInt+=IM(sl[i]);}

  var totalPages = Math.ceil(sl.length / MAX_ROWS) || 1;
  var dataUrls = [];
  var pagesDone = 0;

  function renderPage(pageIdx) {
    var startRow = pageIdx * MAX_ROWS;
    var endRow   = Math.min(startRow + MAX_ROWS, sl.length);
    var rowCount = endRow - startRow;
    var isLast   = (pageIdx === totalPages - 1);

    var footerH = 20 * SCALE;
    var totalRowH = isLast ? rH : 0;
    var ph = hdH + rH + rH*rowCount + totalRowH + footerH; // hd + col-header + rows + total + footer

    cvs.width  = pw;
    cvs.height = ph;
    var ctx = cvs.getContext('2d');

    // ── Background: white
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, pw, ph);

    // ── Header band
    ctx.fillStyle = '#1a2a3a';
    ctx.fillRect(0, 0, pw, hdH);

    // Gold accent left bar
    ctx.fillStyle = '#e9a020';
    ctx.fillRect(0, 0, 5*SCALE, hdH);

    // Brand name
    ctx.font = 'bold '+fsHd+'px -apple-system,sans-serif';
    ctx.fillStyle = '#e9a020';
    ctx.textAlign = 'left';
    ctx.fillText('JiTel Capital', pad, 26*SCALE);

    // Title
    ctx.font = 'bold '+(fsHd-2)+'px -apple-system,sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('Estado de Cuenta: '+name, pad, 46*SCALE);

    // Subtitle: date + page
    ctx.font = fsSub+'px -apple-system,sans-serif';
    ctx.fillStyle = '#99b8cc';
    ctx.fillText(hoyStr()+'  ·  Pág. '+(pageIdx+1)+'/'+totalPages+'  ·  '+sl.length+' préstamos', pad, 62*SCALE);

    // Summary line
    ctx.font = 'bold '+fsSub+'px -apple-system,sans-serif';
    ctx.fillStyle = '#7aadcc';

    // Bottom border of col header

    ctx.fillRect(0, colHdrY + rH - SCALE, pw, SCALE);

      ctx.fillText(hcols[ci2], cx + cW[ci2]/2, colHdrY + rH*0.68);
      cx += cW[ci2];
    }

    // ── Data rows
    for(var ri=0; ri<rowCount; ri++){
      var gi = startRow + ri;
      var l  = sl[gi];
      var rY = colHdrY + rH + ri*rH;

      // Alternating row bg
      ctx.fillStyle = ri%2===0 ? '#ffffff' : '#f7fafc';
      ctx.fillRect(0, rY, pw, rH);

      // Row separator
      ctx.fillStyle = '#e8eef4';

      var vals = [String(l.año), String(l.dia), l.mes_fin, COP(l.monto), COP(IM(l))];
      var valColors = ['#5a7a8a','#1a2a3a','#1a2a3a','#1a3a5a','#0a6a2a'];

        ctx.fillText(txt, cx + cW[ci3]/2, rY + rH*0.68);
        cx += cW[ci3];
      }
    }

    // ── Total row (last page only)
    if(isLast){
      var totY = colHdrY + rH + rowCount*rH;
      ctx.fillStyle = '#1a2a3a';
      ctx.fillRect(0, totY, pw, rH);
      // Gold top border
      ctx.fillStyle = '#e9a020';
      ctx.fillRect(0, totY, pw, 2*SCALE);

      ctx.font = 'bold '+fsRow+'px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      cx = pad;
      ctx.fillStyle = '#e9a020';
      ctx.fillText('TOTAL', cx+cW[0]/2, totY+rH*0.68); cx+=cW[0];
      ctx.fillStyle = '#99b8cc';
      ctx.fillText('', cx+cW[1]/2, totY+rH*0.68); cx+=cW[1];
      ctx.fillStyle = '#99b8cc';
      ctx.fillText('', cx+cW[2]/2, totY+rH*0.68); cx+=cW[2];
      ctx.fillStyle = '#e9a020';
      ctx.fillText(COP(totCap), cx+cW[3]/2, totY+rH*0.68); cx+=cW[3];
      ctx.fillStyle = '#4ac8ff';
      ctx.fillText(COP(totInt), cx+cW[4]/2, totY+rH*0.68);
    }

    // ── Footer
    var ftY = ph - footerH + 13*SCALE;
    ctx.font = fsFt+'px -apple-system,sans-serif';
    ctx.fillStyle = '#b0c4d4';
    ctx.textAlign = 'center';
    ctx.fillText('JiTel Capital — Confidencial — '+hoyStr(), pw/2, ftY);

    // Collect dataUrl
    var dataUrl = cvs.toDataURL('image/png');
    dataUrls.push(dataUrl);
    pagesDone++;

    if(pagesDone < totalPages){
      renderPage(pageIdx + 1);
    } else {
      onDone(dataUrls);
    }
  }

  renderPage(0);
}

function buildOwnerImage(active, onDone) {
  var cvs = document.getElementById('cvs');

  var sc = Math.min(window.innerWidth,540)*2/500;

  var totGan=0,totSoc=0,totCap=0,i;

  var kvW = (tW-pad*2.4)/3;

    else ctx.fillRect(kx,kvY,kvW-Math.round(6*sc),Math.round(40*sc));
    ctx.font=Math.round(9*sc)+'px -apple-system,sans-serif'; ctx.fillStyle='#5a7a9a'; ctx.textAlign='left';
    ctx.fillText(kvs[ki][0],kx+Math.round(8*sc),kvY+Math.round(14*sc));
    ctx.font='bold '+Math.round(12*sc)+'px -apple-system,sans-serif'; ctx.fillStyle=kvs[ki][2];
    ctx.fillText(kvs[ki][1],kx+Math.round(8*sc),kvY+Math.round(30*sc));
  }
  var tY = hdH, cx, cIdx;
  ctx.fillStyle='#1a0e3a'; ctx.fillRect(0,tY,tW,rH);
  var hcols=['Día','Mes Fin','Cliente','Capital','Mi Gan','Costo S'];
  ctx.font='bold '+fsS+'px -apple-system,sans-serif'; ctx.fillStyle='#7a5aaa'; ctx.textAlign='center'; cx=pad;

  for(i=0;i<sl.length;i++){
    var l=sl[i]; var rY=tY+rH*(i+1);

    for(cIdx=0;cIdx<vals.length;cIdx++){

  cx=pad; ctx.font='bold '+fs+'px -apple-system,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='#9b6dff'; ctx.fillText('TOTAL',cx+cW[0]/2,totY+rH*0.65); cx+=cW[0]; cx+=cW[1]; cx+=cW[2];
  ctx.fillStyle='#e9a020'; ctx.fillText(COP(totCap),cx+cW[3]/2,totY+rH*0.65); cx+=cW[3];

  ctx.font=Math.round(8*sc)+'px -apple-system,sans-serif'; ctx.fillStyle='#2a3a4a'; ctx.textAlign='center';
  ctx.fillText('JiTel Capital — Confidencial — '+hoyStr(),tW/2,totY+rH+Math.round(14*sc));

function showExportModal(mode) {
  // mode: 'general' | 'cliente_X' | 'socio_X' | 'owner'
  var active = [], i;
  for(i=0;i<ST.loans.length;i++){if(ST.loans[i].status==='active')active.push(ST.loans[i]);}
  // Build options
  var cm={}, sm={};
  for(i=0;i<active.length;i++){
    var l=active[i];
    if(l.responsable){if(!cm[l.responsable])cm[l.responsable]=[];cm[l.responsable].push(l);}
    if(l.socio){if(!sm[l.socio])sm[l.socio]={capital:0,intS:0,count:0,loans:[]};sm[l.socio].capital+=l.monto;sm[l.socio].intS+=IS(l);sm[l.socio].count++;sm[l.socio].loans.push(l);}
  }
  var curMode = mode || 'general';
  // imgPages: null | string (single) | string[] (multi-page cliente)
  var imgPages = null, generating = false, cur = null, viewPage = 0;

  function isCliMode(){ return curMode.indexOf('cli_')===0; }

  function genForMode() {
    generating = true; imgPages = null; viewPage = 0; refresh();
    if(curMode==='general'){
      buildGeneralImage(active,function(blob,dataUrl){imgPages=dataUrl;generating=false;refresh();});
    } else if(curMode==='owner'){
      buildOwnerImage(active,function(blob,dataUrl){imgPages=dataUrl;generating=false;refresh();});
    } else if(isCliMode()){
      var cname=curMode.slice(4);
      if(cm[cname]){
        buildClienteImage(cname,cm[cname],function(pages){
          imgPages=pages; generating=false; viewPage=0; refresh();
        });
      }
    } else if(curMode.indexOf('soc_')===0){
      var sname=curMode.slice(4);
      if(sm[sname])buildSocioImage(sname,sm[sname],function(dataUrls){imgPages=dataUrls;generating=false;viewPage=0;refresh();});

          b.addEventListener('click',function(){curMode=mv;imgPages=null;viewPage=0;refresh();});
          row.appendChild(b);
        })(modes2[mi][0],modes2[mi][1]);
      }
      sec.appendChild(row); return sec;
    }

    m.appendChild(section('📋 General', [['general','Lista General'],['owner','⭐ Mi Cuenta']]));

    var cOpts = []; var ckeys = Object.keys(cm).sort();
    for(var ci=0;ci<ckeys.length;ci++) cOpts.push(['cli_'+ckeys[ci], ckeys[ci]]);
    if(cOpts.length>0) m.appendChild(section('👤 Por Cliente', cOpts));

        m.appendChild(note);
      }
    }
    return m;
  }
  function refresh(){var nw=render();if(cur&&AM)replModal(cur,nw);else showModal(nw);cur=nw;}
  refresh();
}

// paidMth is called once per loan here; results are not re-evaluated on rebuild()
function clientSemaforo(loans){
  var total=loans.length,paid=0,i;
  for(i=0;i<loans.length;i++){if(paidMth(loans[i]))paid++;}
  if(paid===total)return{emoji:'🟢',color:'var(--grn)',bg:'var(--c-sem-ok-bg)',label:'Al día'};
  if(paid===0)    return{emoji:'🔴',color:'var(--red)',bg:'var(--c-sem-bad-bg)',label:'Sin pagar'};
  return          {emoji:'🟡',color:'var(--c-sem-partial-txt)',bg:'var(--c-sem-partial-bg)',label:paid+'/'+total+' pag.'};
}

  var cIs=+(defs.int_socio*100).toFixed(2);   // socio %

  var hint=D(null,{fontSize:'11px',color:'var(--mut)',marginBottom:'14px',background:'var(--c2)',borderRadius:'8px',padding:'8px 10px',lineHeight:'1.5'},null);

  // Monto
  var montoIn=INP({type:'number',placeholder:'Ej: 2000000',value:''});
  montoIn.inputMode='numeric';
  m.appendChild(FLD('💵 Monto del préstamo (COP)',montoIn));

  // Tasas row
  var isIn2=INP({type:'number',placeholder:'3.5',value:String(cIs),step:'0.1'});
  var ipIn2=INP({type:'number',placeholder:'1.5',value:String(cIp),step:'0.1'});
  m.appendChild(R2(FLD('% Tasa socio/mes',isIn2),FLD('% Tasa propia/mes',ipIn2)));

  // Total rate display (read-only, derived)
  var totalRateEl=D(null,{fontSize:'12px',color:'var(--mut)',marginBottom:'12px',marginTop:'-8px'},null);
  function updTotalRate(){
    var tot=cIs+cIp;
    totalRateEl.textContent='Tasa total cobrada al cliente: '+tot.toFixed(2)+'% mensual · '+(tot*12).toFixed(1)+'% anual';
  }
  updTotalRate();
  m.appendChild(totalRateEl);

  // ── Results area (always visible, updates live) ──
  var resDiv=D('calc-res',null,null);
  m.appendChild(resDiv);

  // Separator before action button
  var sepEl=D(null,{height:'12px'},null);m.appendChild(sepEl);

  // ── "Crear préstamo" button (disabled when monto=0) ──
  var crearBtn=document.createElement('button');
  crearBtn.className='btn';
  crearBtn.style.cssText='width:100%;background:var(--pur);color:#fff;border:none;padding:11px;font-size:13px;border-radius:8px;font-weight:700;touch-action:manipulation;opacity:0.35;cursor:not-allowed;font-family:inherit';
  crearBtn.textContent='→ Crear préstamo con estos datos';
  crearBtn.disabled=true;
  m.appendChild(crearBtn);

  var crearNote=D(null,{fontSize:'11px',color:'var(--mut)',textAlign:'center',marginTop:'6px'},null);
  crearNote.textContent='Ingresa un monto para habilitar';
  m.appendChild(crearNote);

  // ── Live calculation ──
  function calcular(){
    var tot=cIs+cIp;           // % total
    var cuotaTotal=cMonto*(tot/100);
    var cuotaSocio=cMonto*(cIs/100);
    var cuotaPropia=cMonto*(cIp/100);
    var ganAnual=cuotaPropia*12;
    var valid=cMonto>0&&tot>0;

    resDiv.innerHTML='';

    if(!valid){
      var empty=D(null,{textAlign:'center',padding:'16px 0',color:'var(--mut)',fontSize:'13px'},null);
      empty.textContent='Ingresa el monto para ver la simulación';
      resDiv.appendChild(empty);
      crearBtn.disabled=true;crearBtn.style.opacity='0.35';crearBtn.style.cursor='not-allowed';
      crearNote.textContent='Ingresa un monto para habilitar';
      return;
    }

    // Build result rows
    function row(lbl,val,color,icon){
      var r=D('calc-row',null,null);
      var l=D('calc-lbl',null,null);l.textContent=(icon?icon+' ':'')+lbl;
      var v=D('calc-val',{color:color||'var(--txt)'},null);v.textContent=val;
      r.appendChild(l);r.appendChild(v);return r;
    }
    resDiv.appendChild(row('Cobras al cliente / mes',COP(cuotaTotal),'var(--acc)','💰'));
    resDiv.appendChild(row('Pagas al socio / mes',COP(cuotaSocio),'var(--red)','👥'));
    resDiv.appendChild(row('Tu ganancia / mes',COP(cuotaPropia),'var(--grn)','✅'));
    // Visual separator
    var sep=D(null,{height:'1px',background:'linear-gradient(90deg,transparent,var(--pur),transparent)',margin:'2px 0'},null);resDiv.appendChild(sep);
    resDiv.appendChild(row('Tu ganancia anual proyectada',COP(ganAnual),'var(--pur)','📈'));

    // ROI %
    if(cMonto>0){
      var roiMes=(cuotaPropia/cMonto*100).toFixed(2);
      var roiAnual=(ganAnual/cMonto*100).toFixed(1);
      var roiRow=D('calc-row',null,null);
      var roiL=D('calc-lbl',null,null);roiL.textContent='📊 ROI neto (tu %)';
      var roiV=D('calc-val',{color:'var(--pur)'},null);roiV.textContent=roiMes+'%/mes · '+roiAnual+'%/año';
      roiRow.appendChild(roiL);roiRow.appendChild(roiV);resDiv.appendChild(roiRow);
    }

    // Enable crear button
    crearBtn.disabled=false;
    crearBtn.style.opacity='1';crearBtn.style.cursor='pointer';
    crearNote.textContent='Se abrirá el formulario con monto y tasas pre-rellenados';
  }

  // Wire inputs → live update
  montoIn.addEventListener('input',function(e){cMonto=parseFloat(e.target.value)||0;calcular();});
  isIn2.addEventListener('input',function(e){cIs=parseFloat(e.target.value)||0;updTotalRate();calcular();});
  ipIn2.addEventListener('input',function(e){cIp=parseFloat(e.target.value)||0;updTotalRate();calcular();});

  // Crear préstamo button
  crearBtn.addEventListener('click',function(){
    if(!cMonto)return;
    closeModal();
    showNewLoan({monto:cMonto,int_socio:cIs/100,int_propio:cIp/100});
  });

  calcular(); // initial render
  showModal(m);
  // Focus monto on open (slight delay for modal animation)
  setTimeout(function(){montoIn.focus();},120);
}

// ── Helpers ──
function gdriveGetToken(){try{var r=localStorage.getItem(GDRIVE_TOKEN_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function gdriveSetToken(t){try{localStorage.setItem(GDRIVE_TOKEN_KEY,JSON.stringify(t));}catch(e){}}
function gdriveClearToken(){try{localStorage.removeItem(GDRIVE_TOKEN_KEY);}catch(e){}}
function gdriveIsConnected(){var t=gdriveGetToken();return!!(t&&t.access_token&&t.expires_at>Date.now()+5000);}

// ── Load Google Identity Services script (lazy, only when user clicks connect) ──
function gdriveLoadGIS(){
  return new Promise(function(resolve,reject){
    if(gdriveState.gisLoaded&&window.google&&window.google.accounts)return resolve();
    var existing=document.querySelector('script[data-gis]');
    if(existing){existing.addEventListener('load',function(){gdriveState.gisLoaded=true;resolve();});return;}
    var s=document.createElement('script');
    s.src='https://accounts.google.com/gsi/client';
    s.async=true;s.defer=true;
    s.setAttribute('data-gis','1');
    s.onload=function(){gdriveState.gisLoaded=true;resolve();};
    s.onerror=function(){reject(new Error('No se pudo cargar Google Identity Services'));};
    document.head.appendChild(s);
  });
}

// ── Initialize TokenClient (must be called after GIS script loaded) ──
function gdriveInitClient(){
  if(gdriveState.tokenClient)return gdriveState.tokenClient;
  if(!window.google||!google.accounts||!google.accounts.oauth2)return null;
  if(GDRIVE_CLIENT_ID.indexOf('REPLACE_WITH_YOUR')===0){
    alert('⚠️ Configuración pendiente\n\nDebes reemplazar GDRIVE_CLIENT_ID en el código con tu Client ID de Google Cloud Console.\n\nVer instrucciones en el comentario al inicio del módulo Google Drive.');
    return null;
  }
  gdriveState.tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GDRIVE_CLIENT_ID,
    scope:GDRIVE_SCOPE,
    prompt:'',  // empty = use cached consent when possible (silent renewal)
    callback:function(resp){
      if(resp.error){
        console.error('[GDrive] Auth error:',resp);
        gdriveState.inflightAuth=false;
        if(gdriveState.pendingResolve)gdriveState.pendingReject(new Error(resp.error_description||resp.error));
        return;
      }
      var token={access_token:resp.access_token,expires_at:Date.now()+((resp.expires_in||3600)*1000)};
      gdriveSetToken(token);
      gdriveState.inflightAuth=false;
      if(gdriveState.pendingResolve)gdriveState.pendingResolve(token);
    }
  });
  return gdriveState.tokenClient;
}

// ── Request a fresh access token (uses cached consent silently when possible) ──
function gdriveRequestToken(forcePrompt){
  return new Promise(function(resolve,reject){
    var client=gdriveInitClient();
    if(!client)return reject(new Error('Cliente OAuth no inicializado'));
    gdriveState.pendingResolve=resolve;
    gdriveState.pendingReject=reject;
    gdriveState.inflightAuth=true;
    try{
      client.requestAccessToken({prompt:forcePrompt?'consent':''});
    }catch(e){
      gdriveState.inflightAuth=false;reject(e);
    }
  });
}

// ── Ensure a valid token, renewing silently if < 30 min left ──
function gdriveEnsureToken(){
  var existing=gdriveGetToken();
  if(existing&&existing.access_token&&existing.expires_at>Date.now()+30*60*1000){
    return Promise.resolve(existing);
  }
  // Need new token — try silent first
  return gdriveLoadGIS().then(function(){return gdriveRequestToken(false);});
}

// ── Renovación silenciosa preventiva (llamada por setInterval cada 45 min) ──
function gdriveRenewSilent(){
  var tok=gdriveGetToken();
  if(!tok||!tok.access_token)return; // nunca conectado
  if(tok.expires_at>Date.now()+30*60*1000)return; // aún tiene más de 30 min: no urgente
  if(gdriveState.inflightAuth)return; // ya hay una renovación en vuelo
  gdriveLoadGIS().then(function(){return gdriveRequestToken(false);}).then(function(){
    gdriveState.silentFailCount=0; // éxito → resetear contador
  }).catch(function(err){
    gdriveState.silentFailCount++;
    console.warn('[GDrive] Silent renew failed ('+gdriveState.silentFailCount+'):',err);
    if(gdriveState.silentFailCount>=3){
      gdriveState.silentFailCount=0;
      showToast('⚠️ Backup Drive: token expirado, reconecta en Resumen');
    }
  });
}
