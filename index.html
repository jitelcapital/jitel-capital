// ── API call helper with auto-retry on 401 ──
function gdriveFetch(url,opts){
  return gdriveEnsureToken().then(function(token){
    opts=opts||{};opts.headers=opts.headers||{};
    opts.headers['Authorization']='Bearer '+token.access_token;
    return fetch(url,opts).then(function(r){
      if(r.status===401){
        // Token rejected — clear and retry once
        gdriveClearToken();
        return gdriveEnsureToken().then(function(t2){
          opts.headers['Authorization']='Bearer '+t2.access_token;
          return fetch(url,opts);
        });
      }
      return r;
    });
  });
}

// ── Find or create the "JiTel Capital/backups" folder ──
function gdriveGetFolder(){
  if(gdriveState.folderId)return Promise.resolve(gdriveState.folderId);
  // Step 1: find or create root folder
  function findOrCreate(name,parentId){
    var q="name='"+name.replace(/'/g,"\\'")+"' and mimeType='application/vnd.google-apps.folder' and trashed=false";
    if(parentId)q+=" and '"+parentId+"' in parents";
    var url='https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)&spaces=drive';
    return gdriveFetch(url).then(function(r){return r.json();}).then(function(data){
      if(data.files&&data.files.length>0)return data.files[0].id;
      // Create
      var body={name:name,mimeType:'application/vnd.google-apps.folder'};
      if(parentId)body.parents=[parentId];
      return gdriveFetch('https://www.googleapis.com/drive/v3/files',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      }).then(function(r){return r.json();}).then(function(d){return d.id;});
    });
  }
  return findOrCreate(GDRIVE_FOLDER_NAME,null).then(function(rootId){
    return findOrCreate(GDRIVE_SUBFOLDER,rootId);
  }).then(function(subId){
    gdriveState.folderId=subId;
    return subId;
  });
}

  for(i=0;i<ST.loans.length;i++){

    function esc(v){var s=String(v===undefined||v===null?'':v);return s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0?'"'+s.replace(/"/g,'""')+'"':s;}
    var base=[l.id,l.año,l.dia,l.mes_fin,l.monto,l.socio,l.int_socio,l.int_propio,l.responsable,l.mes_comienzo,l.status,l.nota||'',l.created_at||'',l.recibido?'1':'0',l.pagado_socio?'1':'0'].map(esc).join(',');
    var pagos=l.pagos||[];
    if(pagos.length===0){lines.push(base+',,,,,');}
    else{for(j=0;j<pagos.length;j++){var p=pagos[j];lines.push(base+','+ [p.id,p.tipo,p.monto,p.fecha,p.nota||''].map(esc).join(','));}}
  }
  var archJson=JSON.stringify(ST.archives||{}).replace(/"/g,'""');
  lines.push('"__ARCHIVES__","'+archJson+'",,,,,,,,,,,,,,,,,,');
  return lines.join('\n');
}

// ── Upload current state as CSV to Drive ──
function gdriveUploadBackup(){
  if(!gdriveIsConnected())return Promise.reject(new Error('Drive no conectado'));
  var csv=gdriveBuildCSV();
  var d=new Date();
  var dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var filename='jitel_backup_'+dateStr+'.csv';
  return gdriveGetFolder().then(function(folderId){
    // Multipart upload
    var boundary='-------jitel-boundary-'+Date.now();
    var metadata={name:filename,parents:[folderId],mimeType:'text/csv'};
    var body=
      '--'+boundary+'\r\n'+
      'Content-Type: application/json; charset=UTF-8\r\n\r\n'+
      JSON.stringify(metadata)+'\r\n'+
      '--'+boundary+'\r\n'+
      'Content-Type: text/csv; charset=UTF-8\r\n\r\n'+
      csv+'\r\n'+
      '--'+boundary+'--';
    return gdriveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',{
      method:'POST',
      headers:{'Content-Type':'multipart/related; boundary='+boundary},
      body:body
    }).then(function(r){
      if(!r.ok)return r.text().then(function(t){throw new Error('Upload failed '+r.status+': '+t);});
      return r.json();
    }).then(function(uploaded){
      gdriveSetLastBackup(new Date().toISOString());
      return gdrivePruneOldBackups().then(function(){return uploaded;});
    });
  });
}

// ── Delete oldest backups beyond GDRIVE_MAX_BACKUPS ──
function gdrivePruneOldBackups(){
  if(!gdriveState.folderId)return Promise.resolve();
  var q="'"+gdriveState.folderId+"' in parents and name contains 'jitel_backup_' and trashed=false";
  var url='https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name,createdTime)&orderBy=createdTime desc&spaces=drive';
  return gdriveFetch(url).then(function(r){return r.json();}).then(function(data){
    var files=data.files||[];
    if(files.length<=GDRIVE_MAX_BACKUPS)return;
    var toDelete=files.slice(GDRIVE_MAX_BACKUPS);
    return Promise.all(toDelete.map(function(f){
      return gdriveFetch('https://www.googleapis.com/drive/v3/files/'+f.id,{method:'DELETE'}).catch(function(e){console.warn('[GDrive] Could not delete',f.name,e);});
    }));
  }).catch(function(e){console.warn('[GDrive] Prune failed (non-fatal):',e);});
}

// ── Auto-backup check on app load ──
function gdriveMaybeAutoBackup(){
  if(!gdriveIsConnected())return;
  var last=gdriveGetLastBackup();
  if(last){
    var elapsed=Date.now()-new Date(last).getTime();
    if(elapsed<24*3600*1000)return; // < 24h since last backup
  }
  gdriveUploadBackup().then(function(){
    showToast('💾 Backup subido a Google Drive');
  }).catch(function(err){
    console.warn('[GDrive] Auto-backup failed:',err);
    // Don't spam alerts on every load — set a flag the UI can read
    showToast('⚠️ Backup pendiente — revisa conexión Drive');
  });
}

// ── Format "hace X horas" ──
function gdriveTimeSince(iso){
  if(!iso)return null;
  var ms=Date.now()-new Date(iso).getTime();
  var h=Math.floor(ms/3600000);
  if(h<1)return'hace minutos';
  if(h<24)return'hace '+h+'h';
  var d=Math.floor(h/24);
  return'hace '+d+'d';
}
function gdriveHoursSinceLastBackup(){
  var last=gdriveGetLastBackup();
  if(!last)return null;
  return(Date.now()-new Date(last).getTime())/3600000;
}

function loadFromFirestore(cb){

  FB.db.collection('prestamos').get().then(function(snap){
    snap.forEach(function(doc){

// Carga ST desde Firestore con timeout de 15 s y hasta 3 reintentos automáticos.
// Si todos los intentos fallan cae a localStorage (fallback silencioso).
// renderApp() lo invoca startApp() desde el cb — no se llama aquí para evitar render prematuro.
function loadSTAsync(cb){
  return new Promise(function(resolve){
    function finish(){
      if(typeof cb==='function')cb();
      resolve(ST);
    }
    function useLocal(){
      var local=null;try{local=loadST();}catch(le){local=null;}
      if(local&&local.loans&&local.loans.length>0){ST=local;}
      else ST={loans:[],archives:{}};
      syncInd('local');
      finish();
    }
    if(!FB.ready||!FB.db){useLocal();return;}
    var MAX=3,attempt=0;
    function tryLoad(){
      attempt++;
      if(attempt>1)setLoadingMsg('Reconectando… puede tomar hasta 45s en red lenta ('+attempt+'/'+MAX+')');
      var settled=false;
      var timer=setTimeout(function(){
        if(settled)return;settled=true;
        console.warn('[Firebase] Timeout carga intento '+attempt+'/'+MAX);
        if(attempt<MAX){tryLoad();}
        else{console.warn('[Firebase] Sin respuesta tras '+MAX+' intentos — usando localStorage');useLocal();}
      },15000);
      loadFromFirestore(function(data){
        if(settled)return;settled=true;
        clearTimeout(timer);
        if(data&&data.loans&&data.loans.length>0){ST=data;syncInd('cloud');finish();}
        else if(data===null&&attempt<MAX){tryLoad();}
        else{useLocal();}
      });
    }
    tryLoad();
  });
}

// ── Escritura: sync best-effort a Firestore (Fase 5) ──
// Convierte un loan a documento plano JSON (incluye el array pagos — "todos los campos").
function loanToDoc(l){var c={},k;for(k in l){if(l.hasOwnProperty(k))c[k]=l[k];}return c;}
var _fbSyncTimer=null;
function fbSyncDebounced(){
  if(!FB.ready||!FB.db||!isAdmin())return;
  syncInd('syncing');
  if(_fbSyncTimer)clearTimeout(_fbSyncTimer);
  _fbSyncTimer=setTimeout(fbPushAll,1500);
}
function fbPushAll(){
  if(!FB.ready||!FB.db||!isAdmin())return;
  try{
    var loans=ST.loans||[],i,chunk=400;
    // Escribe en lotes (límite Firestore 500 ops/batch).
    function pushChunk(start){
      var batch=FB.db.batch();
      var end=Math.min(start+chunk,loans.length),n;
      for(n=start;n<end;n++){var l=loans[n];if(!l.id)l.id=GID();batch.set(FB.db.collection('prestamos').doc(l.id),loanToDoc(l));}
      if(end>=loans.length)batch.set(FB.db.collection('config').doc('global'),{currMk:CURR_MK,archives:ST.archives||{},updatedAt:Date.now()});
      batch.commit().then(function(){
        if(end<loans.length){pushChunk(end);}
        else{syncInd('cloud');}
      }).catch(function(e){console.warn('[Firebase] Error de sincronización:',e&&e.message);syncInd('local');});
    }
    if(loans.length===0){FB.db.collection('config').doc('global').set({currMk:CURR_MK,archives:ST.archives||{},updatedAt:Date.now()}).then(function(){syncInd('cloud');}).catch(function(){syncInd('local');});}
    else pushChunk(0);
  }catch(e){console.warn('[Firebase] Excepción en sincronización:',e&&e.message);syncInd('local');}
}

// ── MIGRACIÓN (Fase 4): localStorage → Firestore. Solo admin. Usar desde consola. ──
function migrarAFirebase(){
  if(!FB.ready||!FB.db){console.error('❌ Firebase no está inicializado.');return;}
  if(!FB.user){console.error('❌ Debes iniciar sesión primero.');return;}
  if(!isAdmin()){
    console.error('❌ Solo un usuario con rol "admin" puede migrar.');
    console.info('ℹ️ Si eres el administrador y aún no tienes perfil, ejecuta: jitelBootstrapAdmin("Julián")');
    return;
  }
  var loans=ST.loans||[];var total=loans.length;
  console.log('🚀 Iniciando migración de '+total+' préstamos a Firestore...');
  var idx=0;
  function finish(){
    FB.db.collection('config').doc('global').set({currMk:CURR_MK,archives:ST.archives||{},migratedAt:Date.now()}).then(function(){
      console.log('✅ Migración completa — '+total+' préstamos migrados');
      if(typeof showToast==='function')showToast('✅ Migración completa — '+total+' préstamos');
    }).catch(function(e){console.error('Error guardando config:',e&&e.message);});
  }
  function next(){
    if(idx>=total){finish();return;}
    var l=loans[idx];if(!l.id)l.id=GID();
    console.log('Migrando préstamo '+(idx+1)+' de '+total+'...');
    FB.db.collection('prestamos').doc(l.id).set(loanToDoc(l)).then(function(){
      var pagos=l.pagos||[];
      if(pagos.length===0){idx++;next();return;}
      var pbatch=FB.db.batch();
      for(var pi=0;pi<pagos.length;pi++){var pg=pagos[pi];if(!pg.id)pg.id=GID();pbatch.set(FB.db.collection('pagos').doc(l.id).collection('pagos').doc(pg.id),pg);}
      pbatch.commit().then(function(){idx++;next();}).catch(function(e){console.error('Error en pagos del préstamo '+l.id+':',e&&e.message);idx++;next();});
    }).catch(function(e){console.error('Error migrando préstamo '+l.id+':',e&&e.message);idx++;next();});
  }
  if(total===0)finish();else next();
}

// FAB: semi-transparente al hacer scroll, opaco al detenerse
(function(){
  var fab=document.getElementById('btn-calc');
  var ct=document.getElementById('content');
  if(!fab||!ct)return;
  var t=null;
  ct.addEventListener('scroll',function(){
    fab.style.opacity='0.2';
    if(t)clearTimeout(t);
    t=setTimeout(function(){fab.style.opacity='1';t=null;},600);
  },false);
})();

// Camino de respaldo: si el SDK de Firebase no está disponible, la app sigue
// funcionando con localStorage (sin login) — nunca queda inutilizable.
function bootLegacyLocal(){
  try{
    var saved=loadST();
    if(saved&&saved.loans&&saved.loans.length>0){ST=saved;}
    else ST={loans:[],archives:{}};
  }catch(e){try{localStorage.removeItem(LSK);}catch(le){}ST={loans:[],archives:{}};}
  syncInd('local');
  startApp();
}

(function boot(){
  if(typeof firebase==='undefined'||!firebase.initializeApp){
    console.warn('[Firebase] SDK no disponible — modo localStorage (sin login).');
    bootLegacyLocal();
    return;
  }
  if(!fbInit()){bootLegacyLocal();return;}
  setChrome(false);showLoading();
  FB.auth.onAuthStateChanged(function(user){
    FB.user=user||null;
    if(user){
      loadProfile(user.uid,function(){
        if(isAdmin())bootData();          // admin → app completa (datos Firestore/localStorage)
        else showSocioPlaceholder();       // socio / sin perfil → placeholder (vista socio en Día 2)
      });
    }else{
      FB.perfil=null;
      if(APP_STARTED){location.reload();return;} // logout tras usar la app → reinicio limpio
      showLoginScreen('');
    }
  });
})();
</script>
