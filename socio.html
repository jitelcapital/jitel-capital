<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JiTel Capital — Portal Socio</title>
<style>
:root{--bg:#07111e;--card:#0d1e33;--c2:#112240;--bor:#1c3455;--acc:#e9a020;--txt:#d8e8f5;--mut:#5a7a9a;--grn:#2dd87a;--red:#f04f70;--blu:#4a9eff;--pur:#9b6dff;
--c-suc-bg:#0a1f0a;--c-suc-bor:#1a4a1a;--c-warn-bg:#3a1e0e;--c-day-bg:#1a2a00}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100%}
#app{max-width:600px;margin:0 auto;padding:14px 14px 40px}
#topbar{background:linear-gradient(135deg,#0d1e33 0%,#0a1a2e 100%);border:1px solid var(--bor);border-radius:14px;padding:14px 14px;margin-bottom:16px}
#topbar .brand{font-weight:700;font-size:16px;color:var(--acc);letter-spacing:.3px;line-height:1.4}
#topbar .sub{font-size:12px;color:var(--mut);margin-top:4px}
.card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:14px;margin-bottom:14px}
.sec-title{font-size:13px;font-weight:700;color:var(--acc);margin-bottom:12px}
.mn{font-family:'Courier New',monospace}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
.kpi{background:var(--c2);border:1px solid var(--bor);border-radius:10px;padding:10px 6px;text-align:center}
.kpi .kl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.kpi .kv{font-size:13px;font-weight:700;line-height:1.2;word-break:break-word}
.pbar{background:var(--c2);border-radius:20px;height:12px;overflow:hidden;margin:10px 0 8px}
.pf{background:var(--grn);height:100%;border-radius:20px;transition:width .4s}
.estado-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.estado-lbl{font-size:13px;color:var(--mut)}
.lrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--bor)}
.lrow:last-child{border-bottom:none}
.lrow .ldia{width:46px;flex-shrink:0;text-align:center;background:var(--c2);border:1px solid var(--bor);border-radius:8px;padding:6px 0;font-weight:700;font-size:15px;color:var(--acc)}
.lrow .linfo{flex:1;min-width:0}
.lrow .lcap{font-weight:700;font-size:14px}
.lrow .lint{font-size:12px;color:var(--red);margin-top:2px}
.lrow .ldate{font-size:11px;color:var(--mut);margin-top:3px}
.lrow .lest{flex-shrink:0;font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px;white-space:nowrap}
.lest.ok{color:var(--grn);background:var(--c-suc-bg);border:1px solid var(--c-suc-bor)}
.lest.pend{color:#f0a020;background:var(--c-day-bg);border:1px solid var(--acc)}
.venc-item{display:flex;justify-content:space-between;align-items:center;background:var(--c-warn-bg);border:1px solid var(--acc);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.venc-item:last-child{margin-bottom:0}
.venc-day{font-weight:700;color:var(--acc)}
.venc-amt{font-weight:700;font-family:'Courier New',monospace;color:var(--red)}
.footer{font-size:11px;color:var(--mut);text-align:center;line-height:1.6;margin-top:20px;padding:0 8px}
.err{text-align:center;padding:40px 20px;color:var(--mut)}
.err .err-ico{font-size:42px;margin-bottom:12px}
.err .err-ttl{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:8px}
input[type=email],input[type=password]{width:100%;background:var(--c2);border:1px solid var(--bor);border-radius:8px;color:var(--txt);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;-webkit-appearance:none;transition:border-color .15s}
input[type=email]:focus,input[type=password]:focus{border-color:var(--acc)}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.btn{border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:0 16px;min-height:42px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.ba{background:linear-gradient(135deg,var(--acc) 0%,#c07010 100%);color:#07111e}
.bh{background:transparent;border:1px solid var(--bor);color:var(--txt)}
.btn:disabled{opacity:.5;cursor:default}
.err-sm{font-size:12px;color:var(--red);min-height:16px;margin-bottom:10px;text-align:center}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:38px}
.pw-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--mut);padding:4px;line-height:1;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(prefers-color-scheme:light){
  :root{--bg:#f0f4f8;--card:#ffffff;--c2:#e8ecf2;--bor:#d0d8e4;--txt:#1a2a3a;--mut:#6a7a8a;--grn:#18a858;--red:#d03055;--blu:#1a6fd0;
  --c-suc-bg:#e8f8ed;--c-suc-bor:#7ae0aa;--c-warn-bg:#fff0e8;--c-day-bg:#fef8e0}
  #topbar{background:linear-gradient(135deg,#ffffff 0%,#f0f4f8 100%)}
  input[type=email],input[type=password]{background:#f8fafc}
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
// socio.html — Portal de socio. Login con email/contraseña → busca en socios por email → carga préstamos. ES5 estricto.
(function(){
  var MESES=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  var MESES_CORTO=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  function fmtPeriodo(loan){
    var inicio='',fin='';
    if(loan.mes_comienzo){
      var p=(loan.mes_comienzo+'').split('-');
      var mo=parseInt(p[1]||'0',10)-1;
      if(mo>=0&&mo<12&&p[0])inicio=MESES_CORTO[mo]+' '+p[0];
    }
    if(loan.mes_fin&&loan.año){
      var idx=MESES.indexOf((loan.mes_fin+'').toUpperCase());
      if(idx>=0)fin=MESES_CORTO[idx]+' '+loan.año;
    }
    if(inicio&&fin)return inicio+' → '+fin;
    if(fin)return 'Hasta '+fin;
    if(inicio)return 'Desde '+inicio;
    return '';
  }
  // Meses transcurridos entre 'YYYY-MM' y 'YYYY-MM', inclusive (piloto Victor)
  function monthsElapsed(mesComienzo,uptoMk){
    if(!mesComienzo||!uptoMk)return 0;
    var p1=(mesComienzo+'').split('-'),p2=(uptoMk+'').split('-');
    var y1=parseInt(p1[0],10),m1=parseInt(p1[1],10);
    var y2=parseInt(p2[0],10),m2=parseInt(p2[1],10);
    if(!y1||!m1||!y2||!m2)return 0;
    var n=(y2-y1)*12+(m2-m1)+1;
    return n>0?n:0;
  }
  function loanEndMk(loan){
    if(!loan.mes_fin||!loan.año)return null;
    var idx=MESES.indexOf((loan.mes_fin+'').toUpperCase());
    if(idx<0)return null;
    var mo=idx+1;
    return loan.año+'-'+(mo<10?'0'+mo:String(mo));
  }
  function planProgress(loan,currMk){
    var endMk=loanEndMk(loan);
    if(!loan.mes_comienzo||!endMk)return null;
    var total=monthsElapsed(loan.mes_comienzo,endMk);
    var elapsed=monthsElapsed(loan.mes_comienzo,currMk);
    if(elapsed<0)elapsed=0;
    if(elapsed>total)elapsed=total;
    var pct=total>0?Math.round((elapsed/total)*100):0;
    if(pct>100)pct=100;if(pct<0)pct=0;
    return{pct:pct,total:total,elapsed:elapsed,endMk:endMk};
  }
  var FIREBASE_CONFIG={
    apiKey:'AIzaSyAWxcYHpJjuFhP3pl2YIa6yjOrBL7Bd9K8',
    authDomain:'jitel-capital.firebaseapp.com',
    projectId:'jitel-capital',
    storageBucket:'jitel-capital.firebasestorage.app',
    messagingSenderId:'656658891595',
    appId:'1:656658891595:web:77eac4631631d7e0941ece'
  };
  var COP=function(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);};
  var G=document.getElementById('app');

  // ── Helpers DOM ──
  function el(tag,cls,css,txt){
    var e=document.createElement(tag);
    if(cls)e.className=cls;
    if(css){var ks=Object.keys(css);for(var i=0;i<ks.length;i++)e.style[ks[i]]=css[ks[i]];}
    if(txt!=null)e.textContent=String(txt);
    return e;
  }
  function inpEl(type,ph,val){
    var e=document.createElement('input');
    e.type=type;if(ph)e.placeholder=ph;if(val)e.value=val;
    return e;
  }
  function fldEl(lbl,input){
    var w=el('div','fld',null,null);
    w.appendChild(el('label',null,null,lbl));
    w.appendChild(input);
    return w;
  }
  function pwFldEl(lbl,inp){
    var w=el('div','fld',null,null);
    w.appendChild(el('label',null,null,lbl));
    var wrap=el('div','pw-wrap',null,null);
    wrap.appendChild(inp);
    var eye=el('button','pw-eye',null,'👁');
    eye.type='button';
    eye.setAttribute('tabindex','-1');
    eye.addEventListener('click',function(){inp.type=inp.type==='password'?'text':'password';});
    wrap.appendChild(eye);
    w.appendChild(wrap);
    return w;
  }
  function btnEl(cls,txt,fn){
    var b=el('button','btn '+cls,null,txt);
    if(fn)b.addEventListener('click',fn);
    return b;
  }

  // ── UI de estado ──
  function showLoading(msg){
    G.innerHTML='';
    var box=el('div',null,{textAlign:'center',padding:'80px 20px',color:'var(--mut)',fontSize:'14px'},null);
    box.textContent=msg||'Cargando…';
    G.appendChild(box);
  }
  function showError(msg){
    G.innerHTML='';
    var box=el('div','err',null,null);
    box.appendChild(el('div','err-ico',null,'🔒'));
    box.appendChild(el('div','err-ttl',null,'Acceso no disponible'));
    var p=el('div',null,{fontSize:'13px',lineHeight:'1.6',marginTop:'4px',color:'var(--mut)'},null);
    p.textContent=msg;
    box.appendChild(p);
    G.appendChild(box);
  }
  function fbErrMsg(e){
    var code=(e&&e.code)?e.code:'';
    if(code.indexOf('wrong-password')>=0||code.indexOf('invalid-credential')>=0||code.indexOf('user-not-found')>=0)return 'Correo o contraseña incorrectos.';
    if(code.indexOf('too-many-requests')>=0)return 'Demasiados intentos. Espera un momento.';
    if(code.indexOf('network')>=0)return 'Sin conexión. Verifica tu internet.';
    return 'No se pudo iniciar sesión.';
  }

  // ── Inicializar Firebase ──
  var auth,db;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    auth=firebase.auth();
    db=firebase.firestore();
    try{db.settings({ignoreUndefinedProperties:true,merge:true});}catch(se){}
  }catch(e){
    showError('Error al inicializar el sistema. Recarga la página.');
    return;
  }

  showLoading('Verificando acceso…');

  var currentInfo=null; // perfil del socio activo, usado por showChangePassword para volver al portal

  // ── Boot ──
  auth.onAuthStateChanged(function(user){
    if(user){loadSocioAndLoans(user);}
    else{showLogin();}
  });

  function loadSocioAndLoans(user){
    showLoading('Buscando tu perfil…');
    db.collection('socios').where('email','==',user.email).get()
      .then(function(snap){
        if(snap.empty){
          showError('No tienes acceso a este portal. Contacta a Julián para registrarte.');
          auth.signOut();
          return;
        }
        loadLoans(snap.docs[0].data());
      })
      .catch(function(e){
        showError('Error al verificar acceso: '+(e&&e.message||''));
      });
  }

  function loadLoans(info){
    currentInfo=info;
    var nombre=(info.nombre||'').toUpperCase();
    showLoading('Cargando tus préstamos…');
    db.collection('prestamos').where('socio','==',nombre).get()
      .then(function(snap){
        var loans=[],allLoans=[];
        snap.forEach(function(doc){
          var l=doc.data();
          allLoans.push(l);
          if(l.status==='active')loans.push(l);
        });
        loans.sort(function(a,b){return (a.dia||0)-(b.dia||0);});
        renderPortal(info,loans,allLoans);
      })
      .catch(function(e){
        showError('No se pudieron cargar los préstamos: '+(e&&e.message||''));
      });
  }

  // ── Formulario de login ──
  function showLogin(){
    G.innerHTML='';
    var wrap=el('div',null,{maxWidth:'400px',margin:'0 auto',paddingTop:'36px'},null);

    var head=el('div',null,{textAlign:'center',marginBottom:'24px'},null);
    head.appendChild(el('div',null,{fontSize:'38px',marginBottom:'8px'},'🏦'));
    head.appendChild(el('div',null,{fontSize:'20px',fontWeight:'700',color:'var(--acc)',letterSpacing:'.3px'},'JiTel Capital'));
    head.appendChild(el('div',null,{fontSize:'13px',color:'var(--mut)',marginTop:'4px'},'Portal Socio'));
    wrap.appendChild(head);

    var card=el('div','card',null,null);
    var emInp=inpEl('email','tu@correo.com','');
    emInp.setAttribute('autocomplete','username');
    var pwInp=inpEl('password','Contraseña','');
    pwInp.setAttribute('autocomplete','current-password');
    var errEl=el('div','err-sm',null,'');
    var submitBtn=btnEl('ba','Ingresar',null);
    submitBtn.style.width='100%';
    submitBtn.style.minHeight='46px';
    submitBtn.style.fontSize='15px';

    card.appendChild(fldEl('Correo',emInp));
    card.appendChild(pwFldEl('Contraseña',pwInp));
    card.appendChild(errEl);
    card.appendChild(submitBtn);

    function doLogin(){
      var em=(emInp.value||'').trim(),pw=pwInp.value||'';
      if(!em||!pw){errEl.textContent='Ingresa correo y contraseña.';return;}
      errEl.textContent='';
      submitBtn.disabled=true;submitBtn.textContent='Ingresando…';submitBtn.style.opacity='.7';
      showLoading('Verificando…');
      auth.signInWithEmailAndPassword(em,pw).catch(function(e){
        G.innerHTML='';G.appendChild(wrap);
        submitBtn.disabled=false;submitBtn.textContent='Ingresar';submitBtn.style.opacity='1';
        errEl.textContent=fbErrMsg(e);
      });
      // Éxito lo maneja onAuthStateChanged → loadSocioAndLoans
    }
    submitBtn.addEventListener('click',doLogin);
    function onEnter(e){if(e.key==='Enter'||e.keyCode===13)doLogin();}
    emInp.addEventListener('keydown',onEnter);
    pwInp.addEventListener('keydown',onEnter);

    wrap.appendChild(card);
    wrap.appendChild(el('div',null,{fontSize:'11px',color:'var(--mut)',textAlign:'center',marginTop:'14px',lineHeight:'1.5'},'Acceso restringido. Solo para socios registrados.'));
    wrap.appendChild(el('div',null,{fontSize:'11px',color:'var(--mut)',textAlign:'center',marginTop:'6px',lineHeight:'1.5'},'¿Olvidaste tu contraseña? Contacta al administrador.'));
    G.appendChild(wrap);
    setTimeout(function(){emInp.focus();},150);
  }

  // ── Vista del portal ──
  function renderPortal(info,loans,allLoans){
    G.innerHTML='';
    var nombre=info.nombre||'Socio';
    var socioNombre=(info.nombre||'').toUpperCase();
    allLoans=allLoans||loans;
    var now=new Date();
    var mesIdx=now.getMonth();
    var anio=now.getFullYear();
    var mesActual=MESES[mesIdx];
    var mesNum=mesIdx+1;
    var CURR_MK=anio+'-'+(mesNum<10?'0'+mesNum:String(mesNum));
    function isCollectable(loan){return !loan.mes_comienzo||loan.mes_comienzo<CURR_MK;}

    // ── TOPBAR ──
    var top=el('div',null,null,null);top.id='topbar';
    var row=el('div',null,{display:'flex',justifyContent:'space-between',alignItems:'center'},null);
    var left=el('div',null,null,null);
    left.appendChild(el('div','brand',null,'🏦 JiTel Capital — Portal '+nombre));
    left.appendChild(el('div','sub',null,mesActual+' '+anio));
    row.appendChild(left);
    var logoutBtn=btnEl('bh','Salir',function(){
      auth.signOut();
    });
    logoutBtn.style.fontSize='12px';logoutBtn.style.padding='5px 10px';logoutBtn.style.minHeight='32px';
    row.appendChild(logoutBtn);
    top.appendChild(row);
    G.appendChild(top);

    // ── CÁLCULOS ──
    var i,l,intS;
    var totalCapital=0,totalInt=0,cobrado=0,pendiente=0;
    for(i=0;i<loans.length;i++){
      l=loans[i];
      totalCapital+=(l.monto||0);
      if(!isCollectable(l))continue;
      intS=(l.monto||0)*(l.int_socio||0);
      totalInt+=intS;
      if(l.pagado_socio){cobrado+=intS;}
      else{pendiente+=intS;}
    }
    var pct=totalInt>0?Math.round((cobrado/totalInt)*100):0;

    // ── KPIs ──
    var c1=el('div','card',null,null);
    c1.appendChild(el('div','sec-title',null,'💼 Tu cartera'));
    var g1=el('div','g3',null,null);
    function kpi(lbl,val,color){
      var k=el('div','kpi',null,null);
      k.appendChild(el('div','kl',null,lbl));
      k.appendChild(el('div','kv',color?{color:color}:null,val));
      return k;
    }
    g1.appendChild(kpi('Préstamos',String(loans.length),'var(--blu)'));
    g1.appendChild(kpi('Capital',COP(totalCapital),'var(--acc)'));
    g1.appendChild(kpi('Interés/mes',COP(totalInt),'var(--grn)'));
    c1.appendChild(g1);
    G.appendChild(c1);

    // ── ESTADO DEL MES ──
    var c2=el('div','card',null,null);
    c2.appendChild(el('div','sec-title',null,'📊 Estado del mes'));
    var er1=el('div','estado-row',null,null);
    er1.appendChild(el('div','estado-lbl',null,'✅ Pagado a ti'));
    er1.appendChild(el('div','mn',{color:'var(--grn)',fontWeight:'700'},COP(cobrado)));
    c2.appendChild(er1);
    var bar=el('div','pbar',null,null);
    bar.appendChild(el('div','pf',{width:pct+'%'},null));
    c2.appendChild(bar);
    var er2=el('div','estado-row',null,null);
    er2.appendChild(el('div','estado-lbl',null,'⏳ Pendiente'));
    er2.appendChild(el('div','mn',{color:'var(--red)',fontWeight:'700'},COP(pendiente)));
    c2.appendChild(er2);
    c2.appendChild(el('div',null,{fontSize:'12px',color:'var(--mut)',textAlign:'center',marginTop:'4px'},pct+'% cobrado — total mes '+COP(totalInt)));
    G.appendChild(c2);

    // ── VENCEN ESTE MES ──
    var vencen=[];
    for(i=0;i<loans.length;i++){
      if((loans[i].mes_fin||'').toUpperCase()===mesActual)vencen.push(loans[i]);
    }
    if(vencen.length>0){
      var c3=el('div','card',null,null);
      c3.appendChild(el('div','sec-title',null,'⚠️ Vencen este mes'));
      for(i=0;i<vencen.length;i++){
        l=vencen[i];
        intS=(l.monto||0)*(l.int_socio||0);
        var vi=el('div','venc-item',null,null);
        var vl=el('div',null,null,null);
        vl.appendChild(el('span','venc-day',null,'Día '+l.dia));
        vl.appendChild(el('div',null,{fontSize:'12px',color:'var(--mut)',marginTop:'2px'},'Capital '+COP(l.monto)));
        vi.appendChild(vl);
        vi.appendChild(el('div','venc-amt',null,COP(intS)));
        c3.appendChild(vi);
      }
      G.appendChild(c3);
    }

    // ── PILOTO VICTOR: Tu cartera con JiTel ──
    if(socioNombre==='VICTOR'){
      var rendimientoTotal=0,ai;
      for(ai=0;ai<allLoans.length;ai++){
        var al=allLoans[ai];
        var mElT=monthsElapsed(al.mes_comienzo,CURR_MK);
        rendimientoTotal+=mElT*(al.int_socio||0)*(al.monto||0);
      }
      var projMensual=0;
      for(ai=0;ai<loans.length;ai++){projMensual+=(loans[ai].monto||0)*(loans[ai].int_socio||0);}
      var proyeccion3=projMensual*3;
      var rentabilidadAnual=totalCapital>0?(projMensual/totalCapital)*12:0;
      var rentPct=parseFloat((Math.round(rentabilidadAnual*10000)/100).toFixed(2));

      var cV=el('div','card',null,null);
      cV.appendChild(el('div','sec-title',null,'🚀 Tu cartera con JiTel'));
      var gV=el('div','g3',null,null);
      gV.appendChild(kpi('Rendimiento acum.',COP(rendimientoTotal),'var(--acc)'));
      gV.appendChild(kpi('Rentab. anual',rentPct+'%','var(--grn)'));
      gV.appendChild(kpi('Proyección 3m',COP(proyeccion3),'var(--blu)'));
      cV.appendChild(gV);

      // Distribución de capital: anónima respecto al cliente — nunca nombre ni día de cobro.
      // Ordenado por tamaño (mayor a menor), top 4 numerados + resto agrupado en "Otros".
      var distColors=['var(--acc)','var(--grn)','var(--blu)','var(--pur)','var(--red)'];
      var distWrap=el('div',null,{marginTop:'12px'},null);
      distWrap.appendChild(el('div',null,{fontSize:'11px',color:'var(--mut)',marginBottom:'6px'},'Distribución de capital'));
      var distBar=el('div',null,{display:'flex',height:'14px',borderRadius:'8px',overflow:'hidden',background:'var(--c2)'},null);
      var distLegend=el('div',null,{display:'flex',flexWrap:'wrap',gap:'8px',marginTop:'8px'},null);
      var distSeg=function(color,label,pctCap){
        distBar.appendChild(el('div',null,{width:pctCap+'%',background:color},null));
        var leg=el('div',null,{display:'flex',alignItems:'center',gap:'4px',fontSize:'10px',color:'var(--mut)'},null);
        leg.appendChild(el('span',null,{width:'8px',height:'8px',borderRadius:'50%',background:color,display:'inline-block'},null));
        leg.appendChild(el('span',null,null,label+' · '+Math.round(pctCap)+'%'));
        distLegend.appendChild(leg);
      }
      // loanRankTag: mapea id de préstamo → {label,color} del segmento al que pertenece,
      // para que "Tus préstamos" pueda mostrar el mismo tag que la gráfica de arriba.
      var loanRankTag={};
      var loansByCap=loans.slice().sort(function(a,b){return (b.monto||0)-(a.monto||0);});
      var topN=Math.min(loansByCap.length,4),si;
      for(si=0;si<topN;si++){
        var pctCap=totalCapital>0?(loansByCap[si].monto||0)/totalCapital*100:0;
        var lblTop='Préstamo '+(si+1),colorTop=distColors[si%distColors.length];
        distSeg(colorTop,lblTop,pctCap);
        if(loansByCap[si].id)loanRankTag[loansByCap[si].id]={label:lblTop,color:colorTop};
      }
      if(loansByCap.length>4){
        var restCount=loansByCap.length-4,restCap=0,ri;
        for(ri=4;ri<loansByCap.length;ri++)restCap+=(loansByCap[ri].monto||0);
        var pctRest=totalCapital>0?restCap/totalCapital*100:0;
        var colorRest=distColors[4%distColors.length];
        distSeg(colorRest,'Otros ('+restCount+' préstamos)',pctRest);
        for(ri=4;ri<loansByCap.length;ri++){if(loansByCap[ri].id)loanRankTag[loansByCap[ri].id]={label:'Otros',color:colorRest};}
      }
      distWrap.appendChild(distBar);
      distWrap.appendChild(distLegend);
      cV.appendChild(distWrap);
      G.appendChild(cV);
    }

    // ── PRÉSTAMOS ──
    var c4=el('div','card',null,null);
    c4.appendChild(el('div','sec-title',null,'📋 Tus préstamos'));
    if(loans.length===0){
      c4.appendChild(el('div',null,{color:'var(--mut)',fontSize:'13px',textAlign:'center',padding:'20px 0'},'No hay préstamos activos.'));
    }else{
      for(i=0;i<loans.length;i++){
        (function(ln,isLast){
          var intSocio=(ln.monto||0)*(ln.int_socio||0);
          var lrow=el('div','lrow',null,null);
          lrow.appendChild(el('div','ldia',null,String(ln.dia||'?')));
          var tasaPct=parseFloat((Math.round((ln.int_socio||0)*10000)/100).toFixed(2));
          var linfo=el('div','linfo',null,null);
          if(socioNombre==='VICTOR'&&loanRankTag[ln.id]){
            var rankInfo=loanRankTag[ln.id];
            var rankTag=el('div',null,{display:'flex',alignItems:'center',gap:'4px',fontSize:'9px',color:'var(--mut)',marginBottom:'4px'},null);
            rankTag.appendChild(el('span',null,{width:'7px',height:'7px',borderRadius:'50%',background:rankInfo.color,display:'inline-block',flexShrink:'0'},null));
            rankTag.appendChild(el('span',null,null,rankInfo.label));
            linfo.appendChild(rankTag);
          }
          linfo.appendChild(el('div','lcap mn',null,'Capital: '+COP(ln.monto)));
          linfo.appendChild(el('div','lint',null,'Interés/mes: '+COP(intSocio)+' ('+tasaPct+'%)'));
          var periodo=fmtPeriodo(ln);
          if(periodo)linfo.appendChild(el('div','ldate',null,periodo));
          lrow.appendChild(linfo);
          var estCls,estTxt;
          if(isCollectable(ln)&&ln.pagado_socio){estCls='ok';estTxt='✅ Pagado';}
          else{estCls='pend';estTxt='⏳ Pendiente';}
          lrow.appendChild(el('div','lest '+estCls,null,estTxt));

          if(socioNombre==='VICTOR'){
            lrow.style.cursor='pointer';
            if(isLast)lrow.style.borderBottom='none';
            var chev=el('div',null,{marginLeft:'2px',color:'var(--mut)',fontSize:'11px',flexShrink:'0'},'▸');
            lrow.appendChild(chev);
            var wrapDiv=el('div',null,null,null);
            wrapDiv.appendChild(lrow);
            var detailEl=null,openD=false;
            var buildDetail=function(){
              var det=el('div',null,{background:'var(--c2)',border:'1px solid var(--bor)',borderRadius:'10px',padding:'12px',marginTop:'-4px',marginBottom:'11px'},null);
              var mElG=monthsElapsed(ln.mes_comienzo,CURR_MK);
              var generado=mElG*(ln.int_socio||0)*(ln.monto||0);
              var prog=planProgress(ln,CURR_MK);

              var compRow=el('div',null,{display:'flex',gap:'8px',marginBottom:'12px'},null);
              var genBox=el('div',null,{flex:'1',minWidth:'0',background:'var(--card)',border:'1px solid var(--bor)',borderRadius:'8px',padding:'8px'},null);
              genBox.appendChild(el('div',null,{fontSize:'9px',color:'var(--mut)',marginBottom:'3px'},'Generado hasta hoy'));
              genBox.appendChild(el('div','mn',{fontSize:'14px',fontWeight:'700',color:'var(--acc)'},COP(generado)));
              compRow.appendChild(genBox);
              if(prog){
                var finBox=el('div',null,{flex:'1',minWidth:'0',background:'var(--card)',border:'1px solid var(--bor)',borderRadius:'8px',padding:'8px'},null);
                var totalFinal=(ln.int_socio||0)*(ln.monto||0)*prog.total;
                finBox.appendChild(el('div',null,{fontSize:'9px',color:'var(--mut)',marginBottom:'3px'},'Si llega hasta el final'));
                finBox.appendChild(el('div','mn',{fontSize:'14px',fontWeight:'700',color:'var(--grn)'},COP(totalFinal)));
                compRow.appendChild(finBox);
              }
              det.appendChild(compRow);

              if(prog){
                var pbarW=el('div','pbar',null,null);
                pbarW.appendChild(el('div','pf',{width:prog.pct+'%'},null));
                det.appendChild(pbarW);
                var rowLbl=el('div',null,{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'var(--mut)'},null);
                rowLbl.appendChild(el('span',null,null,'Inicio'));
                rowLbl.appendChild(el('span',null,null,'Hoy · '+prog.pct+'%'));
                rowLbl.appendChild(el('span',null,null,(ln.mes_fin||'')+(ln.año?(' '+ln.año):'')));
                det.appendChild(rowLbl);
              }
              return det;
            }
            lrow.addEventListener('click',function(){
              openD=!openD;
              chev.textContent=openD?'▾':'▸';
              if(openD&&!detailEl){detailEl=buildDetail();wrapDiv.appendChild(detailEl);}
              else if(!openD&&detailEl){detailEl.remove();detailEl=null;}
            });
            c4.appendChild(wrapDiv);
          }else{
            c4.appendChild(lrow);
          }
        })(loans[i],i===loans.length-1);
      }
    }
    G.appendChild(c4);

    // ── FOOTER ──
    var fechaStr=now.toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});
    var ft=el('div','footer',null,null);
    ft.appendChild(el('div',null,null,'Datos en tiempo real desde Firestore.'));
    ft.appendChild(el('div',null,null,'Actualizado: '+fechaStr+'.'));
    var ftCambiar=el('div',null,{marginTop:'10px',cursor:'pointer',color:'var(--mut)',fontSize:'11px',textDecoration:'underline',display:'inline-block'},'🔑 Cambiar contraseña');
    ftCambiar.addEventListener('click',showChangePassword);
    ft.appendChild(ftCambiar);
    G.appendChild(ft);
  }

  // ── Cambio de contraseña ──
  function showChangePassword(){
    G.innerHTML='';
    var wrap=el('div',null,{maxWidth:'400px',margin:'0 auto',paddingTop:'36px'},null);

    var head=el('div',null,{textAlign:'center',marginBottom:'24px'},null);
    head.appendChild(el('div',null,{fontSize:'32px',marginBottom:'8px'},'🔑'));
    head.appendChild(el('div',null,{fontSize:'18px',fontWeight:'700',color:'var(--acc)'},'Cambiar contraseña'));
    wrap.appendChild(head);

    var card=el('div','card',null,null);
    var pw1=inpEl('password','Nueva contraseña','');
    pw1.setAttribute('autocomplete','new-password');
    var pw2=inpEl('password','Confirmar nueva contraseña','');
    pw2.setAttribute('autocomplete','new-password');
    var errEl=el('div','err-sm',null,'');
    var okEl=el('div',null,{fontSize:'12px',color:'var(--grn)',textAlign:'center',minHeight:'16px',marginBottom:'10px'},'');
    var saveBtn=btnEl('ba','Guardar',null);
    saveBtn.style.width='100%';
    var backBtn=btnEl('bh','← Volver al portal',function(){if(currentInfo)loadLoans(currentInfo);});
    backBtn.style.width='100%';backBtn.style.marginTop='8px';

    card.appendChild(pwFldEl('Nueva contraseña',pw1));
    card.appendChild(pwFldEl('Confirmar contraseña',pw2));
    card.appendChild(errEl);
    card.appendChild(okEl);
    card.appendChild(saveBtn);
    card.appendChild(backBtn);

    saveBtn.addEventListener('click',function(){
      var p1=(pw1.value||'').trim(),p2=(pw2.value||'').trim();
      errEl.textContent='';okEl.textContent='';
      if(!p1||!p2){errEl.textContent='Completa ambos campos.';return;}
      if(p1.length<6){errEl.textContent='Mínimo 6 caracteres.';return;}
      if(p1!==p2){errEl.textContent='Las contraseñas no coinciden.';return;}
      saveBtn.disabled=true;saveBtn.textContent='Guardando…';saveBtn.style.opacity='.7';
      var user=auth.currentUser;
      if(!user){errEl.textContent='Sesión expirada. Recarga la página.';return;}
      user.updatePassword(p1)
        .then(function(){
          okEl.textContent='✅ Contraseña actualizada correctamente.';
          saveBtn.disabled=false;saveBtn.textContent='Guardar';saveBtn.style.opacity='1';
          pw1.value='';pw2.value='';
        })
        .catch(function(e){
          saveBtn.disabled=false;saveBtn.textContent='Guardar';saveBtn.style.opacity='1';
          var code=(e&&e.code)?e.code:'';
          if(code.indexOf('requires-recent-login')>=0){
            errEl.textContent='Por seguridad vuelve a iniciar sesión antes de cambiar la contraseña.';
          }else{
            errEl.textContent='Error: '+(e&&e.message||'No se pudo actualizar.');
          }
        });
    });

    wrap.appendChild(card);
    G.appendChild(wrap);
    setTimeout(function(){pw1.focus();},150);
  }
})();
</script>
</body>
</html>
